<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Supervision - MaintenanceBoard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .monitor-pill { display:inline-flex; align-items:center; gap:.45rem; border-radius:999px; padding:.3rem .65rem; font-size:.75rem; font-weight:700; }
    .beat { width:.72rem; height:.72rem; border-radius:999px; box-shadow:0 0 0 4px rgba(34,197,94,.12); }
    .beat-up { background:#22c55e; }
    .beat-down { background:#ef4444; box-shadow:0 0 0 4px rgba(239,68,68,.12); }
    .beat-warn { background:#f59e0b; box-shadow:0 0 0 4px rgba(245,158,11,.12); }
    .uptime-bar { display:grid; grid-template-columns:repeat(24,minmax(3px,1fr)); gap:3px; height:1.9rem; align-items:end; }
    .uptime-seg { border-radius:3px; min-height:.7rem; }
  </style>
</head>
<body class="bg-slate-50">
<div id="layout-root"></div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/layout.js"></script>
<script>
document.getElementById('layout-root').innerHTML = getLayoutTemplate('Supervision', 'supervision') + `
  <div class="space-y-6">
    <div class="grid gap-4 md:grid-cols-4">
      <div class="rounded-lg border border-slate-200 bg-white p-4">
        <p class="text-xs font-semibold uppercase text-slate-400">Sondes</p>
        <p id="metric-total" class="mt-2 text-3xl font-bold text-slate-900">0</p>
      </div>
      <div class="rounded-lg border border-emerald-200 bg-emerald-50 p-4">
        <p class="text-xs font-semibold uppercase text-emerald-600">OK</p>
        <p id="metric-up" class="mt-2 text-3xl font-bold text-emerald-700">0</p>
      </div>
      <div class="rounded-lg border border-red-200 bg-red-50 p-4">
        <p class="text-xs font-semibold uppercase text-red-600">Indisponibles</p>
        <p id="metric-down" class="mt-2 text-3xl font-bold text-red-700">0</p>
      </div>
      <div class="rounded-lg border border-amber-200 bg-amber-50 p-4">
        <p class="text-xs font-semibold uppercase text-amber-600">Alertes</p>
        <p id="metric-alerts" class="mt-2 text-3xl font-bold text-amber-700">0</p>
      </div>
    </div>

    <div class="grid gap-6 xl:grid-cols-[minmax(0,1fr)_360px]">
      <section class="space-y-6">
        <div class="rounded-lg border border-slate-200 bg-white">
          <div class="flex flex-wrap items-center justify-between gap-3 border-b border-slate-100 px-5 py-4">
            <div>
              <h2 class="font-semibold text-slate-900">Vue synthétique</h2>
              <p class="mt-1 text-xs text-slate-500">Regroupement par type d’équipement supervisé.</p>
            </div>
            <button id="refresh-btn" class="rounded-lg border border-slate-200 px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50">Actualiser</button>
          </div>
          <div id="groups" class="grid gap-3 p-5 md:grid-cols-2"></div>
        </div>

        <div class="rounded-lg border border-slate-200 bg-white">
          <div class="flex flex-wrap items-center justify-between gap-3 border-b border-slate-100 px-5 py-4">
            <div>
              <h2 class="font-semibold text-slate-900">États</h2>
              <p class="mt-1 text-xs text-slate-500">Dernier état remonté par les pullers.</p>
            </div>
            <div class="flex gap-2">
              <select id="type-filter" class="rounded-lg border border-slate-300 px-3 py-2 text-sm">
                <option value="">Tous les types</option>
              </select>
              <select id="status-filter" class="rounded-lg border border-slate-300 px-3 py-2 text-sm">
                <option value="">Tous les états</option>
                <option value="DOWN">DOWN</option>
                <option value="WARN">WARN</option>
                <option value="UP">UP</option>
              </select>
            </div>
          </div>
          <div id="monitors" class="divide-y divide-slate-100"></div>
          <div id="empty-state" class="hidden p-8 text-center text-sm text-slate-400">Aucune sonde remontée par les pullers.</div>
        </div>
      </section>

      <aside class="space-y-6">
        <div class="rounded-lg border border-slate-200 bg-white">
          <div class="border-b border-slate-100 px-5 py-4">
            <h2 class="font-semibold text-slate-900">Alertes actives</h2>
          </div>
          <div id="alerts" class="divide-y divide-slate-100"></div>
          <div id="alerts-empty" class="hidden p-5 text-sm text-slate-400">Aucune alerte active.</div>
        </div>

        <div class="rounded-lg border border-slate-200 bg-white">
          <div class="border-b border-slate-100 px-5 py-4">
            <h2 class="font-semibold text-slate-900">Notifications PWA</h2>
          </div>
          <div class="space-y-3 p-5">
            <p id="push-status" class="text-sm text-slate-600">Chargement...</p>
            <button id="push-btn" class="w-full rounded-lg bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700">Activer les notifications</button>
          </div>
        </div>

        <div class="rounded-lg border border-slate-200 bg-white">
          <div class="flex items-center justify-between border-b border-slate-100 px-5 py-4">
            <h2 class="font-semibold text-slate-900">Règles de limites</h2>
          </div>
          <form id="rule-form" class="grid gap-3 border-b border-slate-100 p-4">
            <input id="rule-label" class="rounded-lg border border-slate-300 px-3 py-2 text-sm" placeholder="Nom de la règle" value="Latence élevée" />
            <div class="grid grid-cols-2 gap-2">
              <input id="rule-equipment-type" class="rounded-lg border border-slate-300 px-3 py-2 text-sm" placeholder="Type ciblé" />
              <input id="rule-harvest-name" class="rounded-lg border border-slate-300 px-3 py-2 text-sm" placeholder="Sonde ciblée" />
            </div>
            <div class="grid grid-cols-[1fr_auto] gap-2">
              <input id="rule-threshold" type="number" min="1" step="1" class="rounded-lg border border-slate-300 px-3 py-2 text-sm" placeholder="Seuil ms" value="1000" />
              <select id="rule-severity" class="rounded-lg border border-slate-300 px-3 py-2 text-sm">
                <option value="HIGH">Haute</option>
                <option value="CRITICAL">Critique</option>
                <option value="NORMAL">Normale</option>
              </select>
            </div>
            <button class="rounded-lg bg-slate-900 px-3 py-2 text-sm font-medium text-white hover:bg-slate-800">Ajouter la règle</button>
          </form>
          <div id="rules" class="divide-y divide-slate-100"></div>
          <div id="rules-empty" class="hidden p-5 text-sm text-slate-400">Aucune règle configurée.</div>
        </div>
      </aside>
    </div>
  </div>
</div></main></div>`;

let user;
let snapshot = null;
let rules = [];

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function statusClass(status) {
  if (status === 'UP') return 'bg-emerald-100 text-emerald-700';
  if (status === 'WARN') return 'bg-amber-100 text-amber-700';
  return 'bg-red-100 text-red-700';
}

function randomSegments(status) {
  const cls = status === 'UP' ? 'bg-emerald-400' : status === 'WARN' ? 'bg-amber-400' : 'bg-red-400';
  return Array.from({ length: 24 }, (_, i) => `<span class="uptime-seg ${i > 20 && status !== 'UP' ? cls : 'bg-emerald-400'}" style="height:${10 + (i % 5) * 4}px"></span>`).join('');
}

function render() {
  const summary = snapshot.summary || {};
  document.getElementById('metric-total').textContent = summary.total || 0;
  document.getElementById('metric-up').textContent = summary.up || 0;
  document.getElementById('metric-down').textContent = summary.down || 0;
  document.getElementById('metric-alerts').textContent = summary.alerts || 0;

  const typeFilter = document.getElementById('type-filter');
  const knownTypes = Array.from(new Set(snapshot.harvests.map(item => item.equipmentType))).sort();
  const currentType = typeFilter.value;
  typeFilter.innerHTML = '<option value="">Tous les types</option>' + knownTypes.map(type => `<option value="${escapeHtml(type)}">${escapeHtml(type)}</option>`).join('');
  typeFilter.value = knownTypes.includes(currentType) ? currentType : '';

  document.getElementById('groups').innerHTML = snapshot.groups.map(group => {
    const pct = group.total ? Math.round((group.up / group.total) * 100) : 0;
    return `
      <button class="group-card rounded-lg border border-slate-200 p-4 text-left hover:border-blue-300 hover:bg-blue-50/30" data-type="${escapeHtml(group.type)}">
        <div class="flex items-center justify-between gap-3">
          <div>
            <p class="font-semibold text-slate-900">${escapeHtml(group.type)}</p>
            <p class="mt-1 text-xs text-slate-500">${group.total} sonde(s), ${group.down} en échec</p>
          </div>
          <span class="text-2xl font-bold ${group.down ? 'text-red-600' : 'text-emerald-600'}">${pct}%</span>
        </div>
        <div class="mt-4 h-2 rounded-full bg-slate-100">
          <div class="h-2 rounded-full ${group.down ? 'bg-red-500' : 'bg-emerald-500'}" style="width:${pct}%"></div>
        </div>
      </button>`;
  }).join('');

  document.querySelectorAll('.group-card').forEach(card => card.addEventListener('click', () => {
    typeFilter.value = card.dataset.type || '';
    renderMonitors();
  }));

  renderMonitors();
  renderAlerts();
  renderRules();
  renderPushStatus();
}

function renderMonitors() {
  const type = document.getElementById('type-filter').value;
  const status = document.getElementById('status-filter').value;
  const items = snapshot.harvests.filter(item => (!type || item.equipmentType === type) && (!status || item.status === status));
  document.getElementById('empty-state').classList.toggle('hidden', items.length > 0);
  document.getElementById('monitors').innerHTML = items.map(item => `
    <div class="p-5">
      <div class="flex flex-wrap items-start justify-between gap-4">
        <div class="min-w-0">
          <div class="flex flex-wrap items-center gap-2">
            <span class="beat ${item.status === 'UP' ? 'beat-up' : item.status === 'WARN' ? 'beat-warn' : 'beat-down'}"></span>
            <h3 class="font-semibold text-slate-900">${escapeHtml(item.equipmentName)}</h3>
            <span class="monitor-pill ${statusClass(item.status)}">${escapeHtml(item.status)}</span>
          </div>
          <p class="mt-1 text-sm text-slate-600">${escapeHtml(item.name)} · ${escapeHtml(item.type)} · ${escapeHtml(item.target || '-')}</p>
          <p class="mt-1 text-xs text-slate-400">Puller ${escapeHtml(item.pullerName)} · ${item.checkedAt ? formatDate(item.checkedAt, true) : '-'}</p>
        </div>
        <div class="text-right text-sm">
          <p class="font-semibold text-slate-900">${item.latencyMs != null ? `${item.latencyMs} ms` : '-'}</p>
          <p class="text-xs text-slate-500">HTTP ${item.httpStatus ?? '-'}</p>
        </div>
      </div>
      <div class="mt-4 uptime-bar">${randomSegments(item.status)}</div>
      ${item.message ? `<p class="mt-3 rounded-lg bg-slate-50 px-3 py-2 text-xs text-slate-600">${escapeHtml(item.message)}</p>` : ''}
    </div>
  `).join('');
}

function renderAlerts() {
  const alerts = snapshot.alerts || [];
  document.getElementById('alerts-empty').classList.toggle('hidden', alerts.length > 0);
  document.getElementById('alerts').innerHTML = alerts.map(alert => `
    <div class="p-4">
      <p class="font-medium text-slate-900">${escapeHtml(alert.title)}</p>
      <p class="mt-1 text-xs text-slate-500">${escapeHtml(alert.message)}</p>
      <span class="mt-2 inline-flex rounded-full bg-red-100 px-2 py-0.5 text-xs font-semibold text-red-700">${escapeHtml(alert.severity)}</span>
    </div>
  `).join('');
}

function renderRules() {
  document.getElementById('rules-empty').classList.toggle('hidden', rules.length > 0);
  document.getElementById('rules').innerHTML = rules.map(rule => `
    <div class="p-4">
      <div class="flex items-start justify-between gap-3">
        <div>
          <p class="font-medium text-slate-900">${escapeHtml(rule.label)}</p>
          <p class="mt-1 text-xs text-slate-500">${escapeHtml(rule.equipmentType || 'Tous types')} · ${escapeHtml(rule.harvestName || 'Toutes sondes')}</p>
          <p class="mt-1 text-xs font-mono text-slate-500">${escapeHtml(rule.metric)} ${escapeHtml(rule.operator)} ${escapeHtml(rule.threshold)}</p>
        </div>
        <button class="delete-rule rounded-lg border border-red-200 px-2 py-1 text-xs font-medium text-red-600 hover:bg-red-50" data-id="${escapeHtml(rule.id)}">Supprimer</button>
      </div>
    </div>
  `).join('');
  document.querySelectorAll('.delete-rule').forEach(btn => btn.addEventListener('click', async () => {
    rules = rules.filter(rule => rule.id !== btn.dataset.id);
    await saveRules();
  }));
}

function renderPushStatus() {
  const status = document.getElementById('push-status');
  const btn = document.getElementById('push-btn');
  if (!('serviceWorker' in navigator) || !('PushManager' in window) || !('Notification' in window)) {
    status.textContent = 'Ce navigateur ne supporte pas les notifications push.';
    btn.disabled = true;
    btn.className = 'w-full rounded-lg bg-slate-300 px-4 py-2 text-sm font-medium text-white';
    return;
  }
  if (!snapshot.settings?.pushConfigured) {
    status.textContent = 'Notifications push non configurées côté serveur (VAPID_PUBLIC_KEY / VAPID_PRIVATE_KEY).';
    btn.disabled = true;
    btn.className = 'w-full rounded-lg bg-slate-300 px-4 py-2 text-sm font-medium text-white';
    return;
  }
  status.textContent = Notification.permission === 'granted'
    ? 'Notifications autorisées sur cet appareil.'
    : 'Recevoir les alertes de supervision sur cette PWA.';
  btn.disabled = false;
}

async function saveRules() {
  await api.patch('/supervision/settings', { alertRules: rules });
  showToast('Règles enregistrées');
  await load();
}

async function load() {
  snapshot = await api.get('/supervision');
  rules = snapshot.settings?.alertRules || [];
  render();
}

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = window.atob(base64);
  return Uint8Array.from([...rawData].map(char => char.charCodeAt(0)));
}

async function enablePush() {
  const permission = await Notification.requestPermission();
  if (permission !== 'granted') {
    showToast('Notifications refusées', 'warning');
    return;
  }
  const registration = await navigator.serviceWorker.ready;
  const subscription = await registration.pushManager.subscribe({
    userVisibleOnly: true,
    applicationServerKey: urlBase64ToUint8Array(snapshot.settings.vapidPublicKey)
  });
  await api.post('/supervision/push-subscriptions', { subscription });
  showToast('Notifications supervision activées');
  renderPushStatus();
}

document.getElementById('refresh-btn').addEventListener('click', load);
document.getElementById('type-filter').addEventListener('change', renderMonitors);
document.getElementById('status-filter').addEventListener('change', renderMonitors);
document.getElementById('push-btn').addEventListener('click', () => enablePush().catch(err => showToast(err.message, 'error')));
document.getElementById('rule-form').addEventListener('submit', async event => {
  event.preventDefault();
  const label = document.getElementById('rule-label').value.trim();
  const equipmentType = document.getElementById('rule-equipment-type').value.trim();
  const harvestName = document.getElementById('rule-harvest-name').value.trim();
  const threshold = Number(document.getElementById('rule-threshold').value);
  const severity = document.getElementById('rule-severity').value;
  if (!label) return showToast('Nom de règle requis', 'error');
  if (!Number.isFinite(threshold)) return showToast('Seuil invalide', 'error');
  rules.push({ label, enabled: true, equipmentType, harvestName, metric: 'latencyMs', operator: 'gt', threshold, severity });
  await saveRules();
});

requireLogin().then(async u => {
  user = u;
  renderNav('supervision');
  await load();
}).catch(err => showToast(err.message, 'error'));
</script>
</body>
</html>
