<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assigner les salles – MaintenanceBoard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .filter-tab { color: #64748b; border: 1px solid transparent; }
    .filter-tab.active { background: #1e40af; color: white; border-color: #1e40af; }
    .filter-tab:not(.active):hover { background: #f1f5f9; }
    .card { transition: opacity 0.3s ease, transform 0.3s ease; position: relative; }
    .search-results { max-height: 220px; overflow-y: auto; }
  </style>
</head>
<body class="bg-slate-50">

<div class="min-h-screen flex">
  <!-- Sidebar -->
  <aside id="sidebar" class="w-64 bg-slate-800 flex flex-col fixed inset-y-0 left-0 z-40 -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out">
    <div class="flex items-center gap-3 px-5 py-5 border-b border-slate-700">
      <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center flex-shrink-0">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h14a2 2 0 012 2v10a2 2 0 01-2 2h-2" />
        </svg>
      </div>
      <div>
        <p class="text-white font-bold text-sm">MaintenanceBoard</p>
        <p class="text-slate-400 text-xs">Parc informatique</p>
      </div>
    </div>
    <nav id="main-nav" class="flex-1 p-3 space-y-1 overflow-y-auto"></nav>
    <div class="p-3 border-t border-slate-700">
      <div class="flex items-center gap-3 px-3 py-2">
        <div class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center text-white text-xs font-bold"><span id="user-avatar">?</span></div>
        <div class="flex-1 min-w-0">
          <p id="user-name" class="text-white text-sm font-medium truncate">...</p>
          <p id="user-role" class="text-slate-400 text-xs"></p>
        </div>
        <button id="logout-btn" class="text-slate-400 hover:text-red-400 transition">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <main class="flex-1 lg:ml-64 flex flex-col">
    <!-- Header -->
    <header class="bg-white border-b border-slate-200 px-6 py-4 sticky top-0 z-20">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <button onclick="toggleSidebar()" class="lg:hidden p-1.5 rounded-lg text-slate-500 hover:bg-slate-100 transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
          </button>
          <div>
            <h1 class="text-xl font-semibold text-slate-800">Assigner les salles aux PCs</h1>
            <p id="header-subtitle" class="text-xs text-slate-400 mt-0.5">Chargement...</p>
          </div>
        </div>
        <div class="flex items-center gap-3 flex-wrap">
          <!-- Compteur -->
          <div class="flex items-center gap-1.5 text-sm bg-slate-50 border border-slate-200 rounded-lg px-3 py-1.5">
            <span id="assigned-count" class="font-bold text-green-600">0</span>
            <span class="text-slate-400">assignés /</span>
            <span id="total-count" class="font-medium text-slate-700">0</span>
          </div>
          <!-- Bulk validate -->
          <button id="bulk-btn" class="hidden items-center gap-2 px-4 py-2 bg-green-600 text-white rounded-lg text-sm hover:bg-green-700 transition">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <span id="bulk-btn-label">Valider tout (confiance ≥ 10)</span>
          </button>
          <a href="/agents.html" class="px-4 py-2 border border-slate-200 text-slate-600 rounded-lg text-sm hover:bg-slate-50 transition">
            ← Agents
          </a>
        </div>
      </div>
    </header>

    <div class="flex-1 p-6">

      <!-- Filter tabs -->
      <div class="flex items-center gap-2 mb-5">
        <button class="filter-tab active px-3 py-1.5 rounded-lg text-sm font-medium transition" data-filter="all">
          Tous <span id="count-all" class="ml-1 px-1.5 py-0.5 bg-white/30 rounded text-xs font-bold">0</span>
        </button>
        <button class="filter-tab px-3 py-1.5 rounded-lg text-sm font-medium transition" data-filter="suggested">
          Avec suggestion <span id="count-suggested" class="ml-1 px-1.5 py-0.5 bg-slate-100 rounded text-xs font-bold">0</span>
        </button>
        <button class="filter-tab px-3 py-1.5 rounded-lg text-sm font-medium transition" data-filter="unsure">
          Sans correspondance <span id="count-unsure" class="ml-1 px-1.5 py-0.5 bg-slate-100 rounded text-xs font-bold">0</span>
        </button>
      </div>

      <!-- Loading -->
      <div id="loading" class="py-20 text-center text-slate-400 text-sm">Chargement...</div>

      <!-- Empty state -->
      <div id="empty-state" class="hidden py-20 text-center">
        <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
          <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
          </svg>
        </div>
        <p class="text-lg font-semibold text-slate-700">Tous les PCs ont été traités !</p>
        <p class="text-sm text-slate-400 mt-1">Aucun PC agent sans salle assignée.</p>
        <a href="/agents.html" class="inline-block mt-4 px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700 transition">Retour aux agents</a>
      </div>

      <!-- Cards grid -->
      <div id="cards-container" class="hidden grid grid-cols-1 xl:grid-cols-2 gap-4"></div>

    </div>
  </main>
</div>

<!-- Modal détail salle -->
<div id="room-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[80vh] flex flex-col">
    <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200 flex-shrink-0">
      <div>
        <h3 id="room-modal-name" class="font-semibold text-slate-800"></h3>
        <p id="room-modal-sub" class="text-xs text-slate-400 mt-0.5"></p>
      </div>
      <button id="close-room-modal" class="text-slate-400 hover:text-slate-600">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div id="room-modal-body" class="flex-1 overflow-y-auto px-6 py-4 text-sm text-slate-600">
      <div id="room-modal-loading" class="text-center py-6 text-slate-400">Chargement...</div>
      <div id="room-modal-content" class="hidden"></div>
    </div>
    <div class="px-6 py-3 border-t border-slate-100 flex justify-between items-center flex-shrink-0">
      <span id="room-modal-pc-id" class="hidden"></span>
      <span id="room-modal-room-id" class="hidden"></span>
      <button id="room-modal-assign-btn"
        class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700 transition">
        Assigner cette salle
      </button>
      <button id="close-room-modal-2" class="px-4 py-2 border border-slate-200 text-slate-600 rounded-lg text-sm hover:bg-slate-50 transition">
        Fermer
      </button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/layout.js"></script>
<script>
let user;
requireLogin().then(u => {
  user = u;
  if (user.role !== 'ADMIN') { window.location.href = '/index.html'; return; }
  renderNav('assign-rooms');
});

let allMachines = [];
let allRooms = [];
let assignedCount = 0;
let currentFilter = 'all';

// ── Charger les données ──────────────────────────────────────────────────────
async function loadData() {
  try {
    const [machines, roomsResp] = await Promise.all([
      api.get('/agents/unassigned'),
      api.get('/rooms', { limit: 500 })
    ]);
    allMachines = machines;
    allRooms = roomsResp.data || [];

    document.getElementById('loading').classList.add('hidden');

    if (allMachines.length === 0) {
      document.getElementById('empty-state').classList.remove('hidden');
      document.getElementById('header-subtitle').textContent = 'Aucun PC sans salle';
      document.getElementById('total-count').textContent = '0';
      return;
    }

    document.getElementById('total-count').textContent = allMachines.length;
    document.getElementById('header-subtitle').textContent =
      `${allMachines.length} PC${allMachines.length > 1 ? 's' : ''} sans salle assignée`;

    updateFilterCounts();
    renderCards();
    updateBulkBtn();
  } catch (err) {
    document.getElementById('loading').textContent = 'Erreur : ' + err.message;
  }
}

function updateFilterCounts() {
  const all = document.querySelectorAll('.card').length || allMachines.length;
  const withSug = allMachines.filter(m => m.suggestions && m.suggestions.length > 0).length;
  document.getElementById('count-all').textContent = all;
  document.getElementById('count-suggested').textContent = withSug;
  document.getElementById('count-unsure').textContent = all - withSug;
}

function updateBulkBtn() {
  const cards = [...document.querySelectorAll('.card')];
  const highConf = cards.filter(c => {
    const s = JSON.parse(c.dataset.suggestions || '[]');
    return s.length > 0 && s[0].score >= 10;
  });
  const btn = document.getElementById('bulk-btn');
  if (highConf.length > 0) {
    btn.classList.remove('hidden');
    btn.classList.add('flex');
    document.getElementById('bulk-btn-label').textContent =
      `Valider tout (≥10) — ${highConf.length} PC${highConf.length > 1 ? 's' : ''}`;
  } else {
    btn.classList.add('hidden');
    btn.classList.remove('flex');
  }
}

// ── Rendu des cartes ────────────────────────────────────────────────────────
function renderCards() {
  const container = document.getElementById('cards-container');
  container.classList.remove('hidden');
  container.innerHTML = allMachines.map(buildCard).join('');
  bindSearchEvents();
}

function chipColor(score) {
  if (score >= 15) return 'border-green-300 bg-green-50 text-green-800 hover:bg-green-100';
  if (score >= 10) return 'border-emerald-300 bg-emerald-50 text-emerald-800 hover:bg-emerald-100';
  if (score >= 7)  return 'border-yellow-300 bg-yellow-50 text-yellow-800 hover:bg-yellow-100';
  return 'border-blue-200 bg-blue-50 text-blue-700 hover:bg-blue-100';
}

function buildCard(m) {
  const info = m.agentInfo || {};
  const os = info.os ? info.os.split(' ').slice(0, 3).join(' ') : null;
  const ip = Array.isArray(info.ips) && info.ips.length > 0 ? info.ips[0] : null;
  const lastSeen = m.lastSeenAt ? timeAgo(m.lastSeenAt) : null;
  const suggestions = m.suggestions || [];

  const suggestionsHtml = suggestions.slice(0, 4).map(s => {
    const parts = [s.roomName, s.roomNumber ? `n°${s.roomNumber}` : null, s.building ? `· ${s.building}` : null].filter(Boolean);
    return `
      <button
        onclick="openRoomModal('${s.roomId}', '${m.id}')"
        data-room-id="${s.roomId}"
        class="flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg border text-xs font-medium transition ${chipColor(s.score)}">
        <span>${esc(parts.join(' '))}</span>
        <span class="px-1 py-0.5 bg-white/60 rounded text-xs font-bold">${s.score}</span>
      </button>`;
  }).join('');

  return `
    <div class="card bg-white rounded-xl border border-slate-200 overflow-visible"
         data-id="${m.id}"
         data-hostname="${esc(m.agentHostname || m.name)}"
         data-suggestions='${esc(JSON.stringify(suggestions))}'>

      <!-- PC Info -->
      <div class="px-4 pt-4 pb-3 flex items-start gap-3">
        <div class="w-9 h-9 bg-slate-100 rounded-lg flex items-center justify-center flex-shrink-0 mt-0.5">
          <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h14a2 2 0 012 2v10a2 2 0 01-2 2h-2"/>
          </svg>
        </div>
        <div class="flex-1 min-w-0">
          <p class="font-mono font-semibold text-slate-800 text-sm truncate">${esc(m.agentHostname || m.name)}</p>
          <p class="text-xs text-slate-400 mt-0.5 truncate">
            ${[os, ip].filter(Boolean).join(' · ') || 'Aucune info système'}
          </p>
        </div>
        ${lastSeen ? `<span class="text-xs text-slate-400 flex-shrink-0 mt-0.5">${lastSeen}</span>` : ''}
      </div>

      <!-- Suggestions -->
      <div class="px-4 pb-3">
        ${suggestions.length > 0 ? `
          <p class="text-xs font-medium text-slate-500 mb-2">Correspondances par nom :</p>
          <div class="flex flex-wrap gap-1.5">
            ${suggestionsHtml}
          </div>
          <p class="text-xs text-slate-400 mt-1.5">Cliquez sur une salle pour voir ses équipements et assigner</p>
        ` : `
          <p class="text-xs text-slate-400 italic">Aucune correspondance automatique — utilisez la recherche ci-dessous.</p>
        `}
      </div>

      <!-- Recherche manuelle + ignorer -->
      <div class="px-4 pb-4 border-t border-slate-100 pt-3">
        <div class="relative search-container">
          <input type="text"
            placeholder="Rechercher une salle manuellement..."
            class="search-input w-full border border-slate-200 rounded-lg px-3 py-2 text-xs pr-8 focus:outline-none focus:ring-2 focus:ring-blue-500"
            data-pc-id="${m.id}"
            autocomplete="off" />
          <svg class="absolute right-2.5 top-2.5 w-3.5 h-3.5 text-slate-400 pointer-events-none"
            fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0"/>
          </svg>
          <div class="search-results hidden absolute left-0 right-0 top-full mt-1 bg-white border border-slate-200 rounded-lg shadow-lg z-20 divide-y divide-slate-50"></div>
        </div>
        <div class="mt-2 flex justify-end">
          <button onclick="ignoreCard('${m.id}')"
            class="text-xs text-slate-400 hover:text-slate-600 transition underline underline-offset-2">
            Ignorer (sans salle)
          </button>
        </div>
      </div>
    </div>`;
}

// ── Recherche manuelle ───────────────────────────────────────────────────────
function bindSearchEvents() {
  document.querySelectorAll('.search-input').forEach(input => {
    const container = input.closest('.search-container');
    const results = container.querySelector('.search-results');
    const pcId = input.dataset.pcId;

    input.addEventListener('input', () => {
      const q = input.value.toLowerCase().trim();
      if (!q) { results.classList.add('hidden'); return; }

      const matches = allRooms.filter(r =>
        r.name.toLowerCase().includes(q) ||
        (r.number && r.number.toLowerCase().includes(q)) ||
        (r.building && r.building.toLowerCase().includes(q))
      ).slice(0, 8);

      if (matches.length === 0) {
        results.innerHTML = '<p class="px-3 py-2 text-xs text-slate-400">Aucune salle trouvée</p>';
        results.classList.remove('hidden');
        return;
      }

      results.innerHTML = matches.map(r => `
        <button class="w-full text-left px-3 py-2 hover:bg-blue-50 transition flex items-center justify-between gap-2"
          onclick="openRoomModal('${r.id}', '${pcId}')">
          <span>
            <span class="text-xs font-medium text-slate-800">${esc(r.name)}</span>
            ${r.number ? `<span class="text-slate-400 text-xs ml-1">n°${esc(r.number)}</span>` : ''}
          </span>
          ${r.building ? `<span class="text-xs text-slate-400 flex-shrink-0">${esc(r.building)}</span>` : ''}
        </button>`
      ).join('');
      results.classList.remove('hidden');
    });

    input.addEventListener('blur', () => setTimeout(() => results.classList.add('hidden'), 200));
    input.addEventListener('focus', () => { if (input.value.trim()) input.dispatchEvent(new Event('input')); });
  });
}

// ── Modal détail salle ───────────────────────────────────────────────────────
async function openRoomModal(roomId, pcId) {
  const modal = document.getElementById('room-modal');
  const room = allRooms.find(r => r.id === roomId);
  if (!room) return;

  document.getElementById('room-modal-name').textContent = room.name;
  document.getElementById('room-modal-sub').textContent =
    [room.building, room.number ? `Salle n°${room.number}` : null].filter(Boolean).join(' · ');
  document.getElementById('room-modal-pc-id').textContent = pcId;
  document.getElementById('room-modal-room-id').textContent = roomId;
  document.getElementById('room-modal-loading').classList.remove('hidden');
  document.getElementById('room-modal-content').classList.add('hidden');
  modal.classList.remove('hidden');

  try {
    const detail = await api.get(`/rooms/${roomId}`);
    const equipment = detail.equipment || [];

    document.getElementById('room-modal-content').innerHTML = equipment.length === 0
      ? '<p class="text-slate-400 italic text-center py-4">Aucun équipement dans cette salle.</p>'
      : `<ul class="space-y-2">
          ${equipment.map(e => `
            <li class="flex items-center gap-3 py-2 border-b border-slate-100 last:border-0">
              <div class="w-7 h-7 bg-slate-100 rounded-md flex items-center justify-center flex-shrink-0">
                <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h14a2 2 0 012 2v10a2 2 0 01-2 2h-2"/>
                </svg>
              </div>
              <div class="flex-1 min-w-0">
                <p class="text-sm font-medium text-slate-700 truncate">${esc(e.name)}</p>
                <p class="text-xs text-slate-400">${esc(e.type)}${e.brand ? ' · ' + esc(e.brand) : ''}${e.serialNumber ? ' · S/N ' + esc(e.serialNumber) : ''}</p>
              </div>
              <span class="text-xs px-2 py-0.5 rounded-full flex-shrink-0 ${e.status === 'ACTIVE' ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-500'}">${e.status === 'ACTIVE' ? 'Actif' : e.status}</span>
            </li>`
          ).join('')}
        </ul>`;

    document.getElementById('room-modal-loading').classList.add('hidden');
    document.getElementById('room-modal-content').classList.remove('hidden');
  } catch {
    document.getElementById('room-modal-loading').textContent = 'Erreur de chargement';
  }
}

document.getElementById('close-room-modal').addEventListener('click', () => document.getElementById('room-modal').classList.add('hidden'));
document.getElementById('close-room-modal-2').addEventListener('click', () => document.getElementById('room-modal').classList.add('hidden'));
document.getElementById('room-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('room-modal')) document.getElementById('room-modal').classList.add('hidden');
});
document.getElementById('room-modal-assign-btn').addEventListener('click', () => {
  const pcId = document.getElementById('room-modal-pc-id').textContent;
  const roomId = document.getElementById('room-modal-room-id').textContent;
  document.getElementById('room-modal').classList.add('hidden');
  assignRoom(pcId, roomId);
});

// ── Assigner une salle ───────────────────────────────────────────────────────
async function assignRoom(pcId, roomId) {
  const card = document.querySelector(`.card[data-id="${pcId}"]`);
  if (!card) return;

  const room = allRooms.find(r => r.id === roomId);
  const roomLabel = room ? (room.name + (room.number ? ` n°${room.number}` : '')) : 'Salle assignée';

  card.querySelectorAll('button, input').forEach(el => el.disabled = true);

  try {
    await api.patch(`/agents/${pcId}/confirm`, { roomId });

    assignedCount++;
    document.getElementById('assigned-count').textContent = assignedCount;

    // Flash vert puis disparition
    card.style.border = '2px solid #86efac';
    card.style.background = '#f0fdf4';
    card.innerHTML = `
      <div class="p-4 flex items-center gap-3">
        <div class="w-8 h-8 bg-green-100 rounded-full flex items-center justify-center flex-shrink-0">
          <svg class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
          </svg>
        </div>
        <div>
          <p class="text-sm font-medium text-green-800 font-mono">${esc(card.dataset.hostname || pcId)}</p>
          <p class="text-xs text-green-700">→ ${esc(roomLabel)}</p>
        </div>
      </div>`;

    setTimeout(() => {
      card.style.opacity = '0';
      card.style.transform = 'scale(0.96)';
      setTimeout(() => { card.remove(); checkEmpty(); updateBulkBtn(); }, 300);
    }, 700);

  } catch (err) {
    card.querySelectorAll('button, input').forEach(el => el.disabled = false);
    showToast('Erreur : ' + err.message, 'error');
  }
}

// ── Ignorer ──────────────────────────────────────────────────────────────────
async function ignoreCard(pcId) {
  const card = document.querySelector(`.card[data-id="${pcId}"]`);
  if (!card) return;
  try {
    await api.patch(`/agents/${pcId}/dismiss`, {});
    card.style.opacity = '0';
    card.style.transform = 'scale(0.96)';
    setTimeout(() => { card.remove(); checkEmpty(); updateBulkBtn(); }, 300);
  } catch (err) {
    showToast('Erreur : ' + err.message, 'error');
  }
}

// ── Valider tout (confiance ≥ 10) ───────────────────────────────────────────
document.getElementById('bulk-btn').addEventListener('click', async () => {
  const btn = document.getElementById('bulk-btn');
  btn.disabled = true;

  const cards = [...document.querySelectorAll('.card')];
  let count = 0;
  for (const card of cards) {
    const suggestions = JSON.parse(card.dataset.suggestions || '[]');
    if (suggestions.length > 0 && suggestions[0].score >= 10) {
      await assignRoom(card.dataset.id, suggestions[0].roomId);
      count++;
      await new Promise(r => setTimeout(r, 200));
    }
  }

  showToast(`${count} PC${count > 1 ? 's' : ''} assigné${count > 1 ? 's' : ''} avec succès`);
  btn.disabled = false;
});

// ── Filtres ──────────────────────────────────────────────────────────────────
document.querySelectorAll('.filter-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.filter-tab').forEach(t => {
      t.classList.remove('active');
      t.querySelector('span')?.classList.replace('bg-white/30', 'bg-slate-100');
    });
    tab.classList.add('active');
    tab.querySelector('span')?.classList.replace('bg-slate-100', 'bg-white/30');
    currentFilter = tab.dataset.filter;

    document.querySelectorAll('.card').forEach(card => {
      const suggestions = JSON.parse(card.dataset.suggestions || '[]');
      const hasSuggestion = suggestions.length > 0;
      if (currentFilter === 'all') card.style.display = '';
      else if (currentFilter === 'suggested') card.style.display = hasSuggestion ? '' : 'none';
      else if (currentFilter === 'unsure') card.style.display = !hasSuggestion ? '' : 'none';
    });
  });
});

// ── Vide ? ───────────────────────────────────────────────────────────────────
function checkEmpty() {
  const remaining = document.querySelectorAll('.card').length;
  if (remaining === 0) {
    document.getElementById('cards-container').classList.add('hidden');
    document.getElementById('empty-state').classList.remove('hidden');
    document.getElementById('header-subtitle').textContent = 'Tous les PCs ont été traités !';
  }
}

// ── Utilitaires ──────────────────────────────────────────────────────────────
function esc(str) {
  return (str || '').toString()
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function timeAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 2) return 'maintenant';
  if (mins < 60) return `${mins}min`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h`;
  return `${Math.floor(hrs / 24)}j`;
}

requireLogin().then(() => loadData());
</script>
