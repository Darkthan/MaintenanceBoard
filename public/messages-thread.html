<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Conversation – MaintenanceBoard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      overflow: hidden;
    }

    .thread-shell {
      flex: 1;
      min-height: 0;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
    }

    #thread-panel {
      height: 100%;
      min-height: 0;
    }

    #message-list {
      min-height: 0;
      scroll-behavior: smooth;
      background:
        radial-gradient(circle at top left, rgba(191, 219, 254, 0.35), transparent 26rem),
        linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
    }

    #message-form {
      position: sticky;
      bottom: 0;
      z-index: 10;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(12px);
      box-shadow: 0 -10px 30px rgba(15, 23, 42, 0.08);
    }

    @media (max-width: 767px) {
      .thread-shell {
        padding: 0;
      }

      #thread-loading,
      #thread-error {
        margin: 1rem;
      }

      #thread-panel {
        border-left: 0;
        border-right: 0;
        border-bottom: 0;
        border-radius: 0;
      }

      #message-list {
        padding: 1rem;
      }

      #message-form {
        border-left: 0;
        border-right: 0;
        border-bottom: 0;
        padding: 0.875rem 1rem calc(env(safe-area-inset-bottom, 0px) + 0.875rem);
      }
    }
  </style>
</head>
<body class="bg-slate-50">

<div class="min-h-screen flex">
  <aside id="sidebar" class="w-64 bg-slate-800 flex flex-col fixed inset-y-0 left-0 z-40 -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out">
    <div class="flex items-center gap-3 px-5 py-5 border-b border-slate-700">
      <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8h16M4 8l8 6 8-6M4 16h16" />
        </svg>
      </div>
      <div>
        <p class="text-white font-bold text-sm">MaintenanceBoard</p>
        <p class="text-slate-400 text-xs">Conversation</p>
      </div>
    </div>
    <nav id="main-nav" class="flex-1 p-3 space-y-1 overflow-y-auto"></nav>
    <div class="p-3 border-t border-slate-700">
      <div class="flex items-center gap-3 px-3 py-2">
        <div class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center text-white text-xs font-bold">
          <span id="user-avatar">?</span>
        </div>
        <div class="flex-1 min-w-0">
          <p id="user-name" class="text-white text-sm font-medium truncate">...</p>
          <p id="user-role" class="text-slate-400 text-xs"></p>
        </div>
        <button id="logout-btn" class="text-slate-400 hover:text-red-400 transition">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
        </button>
      </div>
    </div>
  </aside>

  <main class="flex-1 lg:ml-64 flex flex-col">
    <header class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between sticky top-0 z-20">
      <div class="flex items-center gap-3">
        <button onclick="toggleSidebar()" class="lg:hidden p-1.5 rounded-lg text-slate-500 hover:bg-slate-100 transition">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
        <a href="/messages.html" class="inline-flex items-center gap-2 rounded-xl border border-slate-300 px-3 py-2 text-sm text-slate-700 hover:bg-slate-50 transition">
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
          </svg>
          Retour aux conversations
        </a>
        <div>
          <p id="thread-participant-role" class="text-xs uppercase tracking-wide text-slate-400"></p>
          <h1 id="thread-participant-name" class="text-xl font-semibold text-slate-800">Conversation</h1>
          <p id="thread-participant-email" class="text-sm text-slate-500"></p>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <span id="thread-updated-at" class="text-xs text-slate-400 hidden sm:block"></span>
        <div class="relative" id="conversation-menu-wrapper">
          <button id="conversation-menu-btn" type="button"
            class="rounded-xl border border-slate-200 p-2 text-slate-500 hover:bg-slate-100 hover:text-slate-700 transition"
            title="Actions sur la conversation">
            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01" />
            </svg>
          </button>
          <div id="conversation-menu" class="hidden absolute right-0 top-full mt-1 w-52 rounded-2xl border border-slate-200 bg-white shadow-lg z-30 py-1">
            <button type="button" data-menu-action="archive"
              class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-slate-700 hover:bg-slate-50 transition">
              <svg class="h-4 w-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4" />
              </svg>
              <span id="archive-label">Archiver la conversation</span>
            </button>
            <hr class="my-1 border-slate-100">
            <button type="button" data-menu-action="delete"
              class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 transition">
              <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
              </svg>
              Supprimer la conversation
            </button>
          </div>
        </div>
      </div>
    </header>

    <div class="thread-shell">
      <div id="thread-loading" class="bg-white rounded-2xl border border-slate-200 p-10 text-center text-sm text-slate-400">
        Chargement de la conversation...
      </div>

      <div id="thread-error" class="hidden bg-red-50 border border-red-200 rounded-2xl p-6 text-center">
        <p class="text-sm font-medium text-red-700">Conversation introuvable.</p>
        <a href="/messages.html" class="mt-3 inline-flex items-center gap-2 rounded-xl border border-red-200 bg-white px-3 py-2 text-sm text-red-700 hover:bg-red-50 transition">
          Revenir à la messagerie
        </a>
      </div>

      <section id="thread-panel" class="hidden bg-white rounded-2xl border border-slate-200 overflow-hidden flex flex-1 flex-col">
        <div id="message-list" class="flex-1 overflow-y-auto bg-slate-50 px-5 py-5 space-y-3">
          <p class="text-sm text-slate-400 text-center py-10">Chargement...</p>
        </div>

        <form id="message-form" class="sticky bottom-0 z-10 border-t border-slate-200 px-5 py-4 bg-white/95 space-y-3">
          <div id="attachment-preview" class="hidden items-center gap-2 rounded-xl bg-slate-100 px-3 py-2 text-sm text-slate-600">
            <svg class="h-4 w-4 text-blue-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" />
            </svg>
            <span id="attachment-preview-name" class="flex-1 truncate"></span>
            <button id="clear-attachment-btn" type="button" class="text-slate-400 hover:text-red-500 transition">✕</button>
          </div>

          <textarea id="message-input" rows="2" placeholder="Écrire un message..."
            class="w-full rounded-2xl border border-slate-300 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>

          <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
            <div class="flex items-center gap-2">
              <input id="attachment-input" type="file" class="hidden" />
              <button id="pick-attachment-btn" type="button" class="inline-flex items-center gap-2 rounded-xl border border-slate-300 px-3 py-2 text-sm text-slate-700 hover:bg-slate-50 transition">
                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" />
                </svg>
                Joindre un fichier
              </button>
              <p class="text-xs text-slate-400">Images, PDF, Office, texte, ZIP. 20 Mo max.</p>
            </div>
            <button id="send-message-btn" type="submit" class="rounded-xl bg-blue-600 px-4 py-2.5 text-sm font-medium text-white hover:bg-blue-700 transition">
              Envoyer
            </button>
          </div>
        </form>
      </section>
    </div>
  </main>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/layout.js"></script>
<script>
const IMAGE_MIMES = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];

let currentUser = null;
let conversationId = '';
let conversationSummary = null;
let selectedAttachment = null;
let refreshTimer = null;

const threadLoadingEl = document.getElementById('thread-loading');
const threadErrorEl = document.getElementById('thread-error');
const threadPanelEl = document.getElementById('thread-panel');
const threadParticipantRoleEl = document.getElementById('thread-participant-role');
const threadParticipantNameEl = document.getElementById('thread-participant-name');
const threadParticipantEmailEl = document.getElementById('thread-participant-email');
const threadUpdatedAtEl = document.getElementById('thread-updated-at');
const messageListEl = document.getElementById('message-list');
const messageFormEl = document.getElementById('message-form');
const messageInputEl = document.getElementById('message-input');
const attachmentInputEl = document.getElementById('attachment-input');
const attachmentPreviewEl = document.getElementById('attachment-preview');
const attachmentPreviewNameEl = document.getElementById('attachment-preview-name');
const sendMessageBtnEl = document.getElementById('send-message-btn');

function escapeHtml(value) {
  return String(value || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function formatDateTime(value) {
  if (!value) return '';
  return new Date(value).toLocaleString('fr-FR', {
    day: '2-digit',
    month: '2-digit',
    year: 'numeric',
    hour: '2-digit',
    minute: '2-digit'
  });
}

function formatRelative(value) {
  if (!value) return '';
  const then = new Date(value).getTime();
  const diffMinutes = Math.round((Date.now() - then) / 60000);
  if (diffMinutes < 1) return 'à l’instant';
  if (diffMinutes < 60) return `il y a ${diffMinutes} min`;
  const diffHours = Math.round(diffMinutes / 60);
  if (diffHours < 24) return `il y a ${diffHours} h`;
  return formatDateTime(value);
}

function formatFileSize(bytes) {
  const size = Number(bytes || 0);
  if (!size) return '';
  if (size < 1024) return `${size} o`;
  if (size < 1024 * 1024) return `${Math.round(size / 1024)} Ko`;
  return `${(size / (1024 * 1024)).toFixed(1)} Mo`;
}

function buildAttachmentMarkup(message) {
  if (!message.attachmentUrl) return '';
  const name = escapeHtml(message.attachmentName || 'Fichier joint');
  const size = message.attachmentSize ? ` · ${escapeHtml(formatFileSize(message.attachmentSize))}` : '';

  if (IMAGE_MIMES.includes(message.attachmentMime || '')) {
    return `
      <a href="${message.attachmentUrl}" target="_blank" class="mt-2 block">
        <img src="${message.attachmentUrl}" alt="${name}" class="max-h-56 max-w-full rounded-xl object-cover border border-black/10" loading="lazy" />
      </a>
      <a href="${message.attachmentUrl}" target="_blank" class="mt-2 inline-flex items-center gap-2 text-xs font-medium text-blue-700 hover:text-blue-800">
        ${name}${size}
      </a>
    `;
  }

  return `
    <a href="${message.attachmentUrl}" target="_blank" class="mt-2 inline-flex items-center gap-2 rounded-xl border border-black/10 bg-white/70 px-3 py-2 text-xs font-medium text-slate-700 hover:bg-white">
      <svg class="h-4 w-4 flex-shrink-0 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
      </svg>
      <span class="truncate">${name}${size}</span>
    </a>
  `;
}

function renderThreadHeader() {
  if (!conversationSummary) return;
  threadParticipantRoleEl.textContent = conversationSummary.isGroup ? 'Groupe' : (conversationSummary.otherParticipant?.role || '');
  threadParticipantNameEl.textContent = conversationSummary.displayName || conversationSummary.otherParticipant?.name || 'Conversation';
  threadParticipantEmailEl.textContent = conversationSummary.isGroup
    ? (conversationSummary.participants || []).map(user => user.email || user.name).join(' · ')
    : (conversationSummary.otherParticipant?.email || '');
  threadUpdatedAtEl.textContent = conversationSummary.updatedAt ? `Mis à jour ${formatRelative(conversationSummary.updatedAt)}` : '';
  updateConversationMenuLabel();
}

function renderMessages(messages) {
  if (!messages.length) {
    messageListEl.innerHTML = '<p class="text-sm text-slate-400 text-center py-10">Aucun message dans cette conversation.</p>';
    return;
  }

  messageListEl.innerHTML = messages.map(message => {
    const isMine = message.senderId === currentUser.id;
    const isDeleted = !!message.deleted;
    const bubbleClass = isMine
      ? 'bg-blue-600 text-white ml-auto'
      : 'bg-white text-slate-800 mr-auto border border-slate-200';
    const metaClass = isMine ? 'text-blue-100' : 'text-slate-400';
    const content = isDeleted
      ? `<p class="text-xs italic opacity-60">Message supprimé</p>`
      : (message.content ? `<p class="whitespace-pre-wrap break-words text-sm">${escapeHtml(message.content)}</p>` : '');

    const canDelete = !isDeleted && isMine;
    const canCopy = !isDeleted && !!message.content;
    const actions = (canCopy || canDelete) ? `
      <div class="msg-actions flex gap-1 mt-1.5 ${isMine ? 'justify-end' : 'justify-start'}">
        ${canCopy ? `<button type="button" data-msg-copy data-content="${escapeHtml(message.content)}"
          class="inline-flex items-center gap-1 rounded-lg px-2 py-1 text-[10px] font-medium ${isMine ? 'text-blue-100 hover:bg-white/20' : 'text-slate-400 hover:bg-slate-100'} transition"
          title="Copier le message">
          <svg class="h-3 w-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
          </svg>
          Copier</button>` : ''}
        ${canDelete ? `<button type="button" data-msg-delete data-id="${message.id}"
          class="inline-flex items-center gap-1 rounded-lg px-2 py-1 text-[10px] font-medium ${isMine ? 'text-blue-100 hover:bg-white/20' : 'text-slate-400 hover:bg-slate-100'} transition"
          title="Supprimer ce message">
          <svg class="h-3 w-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
          </svg>
          Supprimer</button>` : ''}
      </div>` : '';

    return `
      <div class="flex flex-col ${isMine ? 'items-end' : 'items-start'}">
        <div class="max-w-[85%] rounded-2xl px-4 py-3 shadow-sm ${bubbleClass}">
          <div class="flex items-center justify-between gap-4">
            <p class="text-xs font-semibold ${metaClass}">${escapeHtml(message.sender?.name || 'Utilisateur')}</p>
            <p class="text-[11px] ${metaClass} whitespace-nowrap">${escapeHtml(formatDateTime(message.createdAt))}</p>
          </div>
          ${content}
          ${isDeleted ? '' : buildAttachmentMarkup(message)}
        </div>
        ${actions}
      </div>
    `;
  }).join('');

  // Bind copy
  messageListEl.querySelectorAll('[data-msg-copy]').forEach(btn => {
    btn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(btn.dataset.content);
        showToast('Message copié', 'success');
      } catch {
        showToast('Impossible de copier', 'error');
      }
    });
  });

  // Bind delete
  messageListEl.querySelectorAll('[data-msg-delete]').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!confirm('Supprimer ce message ?')) return;
      try {
        await api.delete(`/messages/conversations/${conversationId}/messages/${btn.dataset.id}`);
        await loadMessages();
      } catch (err) {
        showToast(err.message || 'Erreur', 'error');
      }
    });
  });

  messageListEl.scrollTop = messageListEl.scrollHeight;
}

function updateConversationMenuLabel() {
  const label = document.getElementById('archive-label');
  if (!label) return;
  label.textContent = conversationSummary?.archivedAt ? 'Désarchiver la conversation' : 'Archiver la conversation';
}

async function handleConversationMenuAction(action) {
  document.getElementById('conversation-menu')?.classList.add('hidden');
  if (action === 'archive') {
    try {
      const { archived } = await api.patch(`/messages/conversations/${conversationId}/archive`, {});
      conversationSummary = conversationSummary ? { ...conversationSummary, archivedAt: archived ? new Date() : null } : conversationSummary;
      updateConversationMenuLabel();
      showToast(archived ? 'Conversation archivée' : 'Conversation désarchivée', 'success');
    } catch (err) {
      showToast(err.message || 'Erreur', 'error');
    }
  } else if (action === 'delete') {
    if (!confirm('Supprimer définitivement cette conversation et tous ses messages ?')) return;
    try {
      await api.delete(`/messages/conversations/${conversationId}`);
      window.location.href = '/messages.html';
    } catch (err) {
      showToast(err.message || 'Erreur', 'error');
    }
  }
}

function setAttachment(file) {
  selectedAttachment = file || null;
  if (!selectedAttachment) {
    attachmentPreviewEl.classList.add('hidden');
    attachmentPreviewEl.classList.remove('flex');
    attachmentPreviewNameEl.textContent = '';
    attachmentInputEl.value = '';
    return;
  }

  attachmentPreviewNameEl.textContent = `${selectedAttachment.name} · ${formatFileSize(selectedAttachment.size)}`;
  attachmentPreviewEl.classList.remove('hidden');
  attachmentPreviewEl.classList.add('flex');
}

async function loadConversationSummary() {
  const conversations = await api.get('/messages/conversations');
  conversationSummary = conversations.find(item => item.id === conversationId) || null;
  if (!conversationSummary) throw new Error('Conversation introuvable');
  renderThreadHeader();
}

async function loadMessages() {
  const messages = await api.get(`/messages/conversations/${conversationId}/messages`);
  renderMessages(messages);
}

async function openThread() {
  await loadConversationSummary();
  await loadMessages();
  threadLoadingEl.classList.add('hidden');
  threadErrorEl.classList.add('hidden');
  threadPanelEl.classList.remove('hidden');
}

async function handleMessageSubmit(event) {
  event.preventDefault();

  const content = messageInputEl.value.trim();
  if (!content && !selectedAttachment) {
    showToast('Ajoutez un message ou un fichier', 'error');
    return;
  }

  sendMessageBtnEl.disabled = true;
  sendMessageBtnEl.classList.add('opacity-60', 'cursor-not-allowed');

  try {
    const formData = new FormData();
    formData.append('content', content);
    if (selectedAttachment) formData.append('attachment', selectedAttachment);

    await api.upload(`/messages/conversations/${conversationId}/messages`, formData);
    messageInputEl.value = '';
    setAttachment(null);
    await openThread();
  } catch (error) {
    showToast(error.message || 'Envoi impossible', 'error');
  } finally {
    sendMessageBtnEl.disabled = false;
    sendMessageBtnEl.classList.remove('opacity-60', 'cursor-not-allowed');
  }
}

function startAutoRefresh() {
  clearInterval(refreshTimer);
  refreshTimer = setInterval(async () => {
    try {
      await openThread();
    } catch (error) {
      console.error('[messages-thread] refresh failed', error);
    }
  }, 15000);
}

const conversationMenuBtn = document.getElementById('conversation-menu-btn');
const conversationMenu = document.getElementById('conversation-menu');

conversationMenuBtn?.addEventListener('click', (e) => {
  e.stopPropagation();
  conversationMenu?.classList.toggle('hidden');
});

conversationMenu?.querySelectorAll('[data-menu-action]').forEach(btn => {
  btn.addEventListener('click', () => handleConversationMenuAction(btn.dataset.menuAction));
});

document.addEventListener('click', (e) => {
  if (!document.getElementById('conversation-menu-wrapper')?.contains(e.target)) {
    conversationMenu?.classList.add('hidden');
  }
});

document.getElementById('pick-attachment-btn').addEventListener('click', () => attachmentInputEl.click());
document.getElementById('clear-attachment-btn').addEventListener('click', () => setAttachment(null));
attachmentInputEl.addEventListener('change', event => setAttachment(event.target.files?.[0] || null));
messageFormEl.addEventListener('submit', handleMessageSubmit);

requireLogin().then(async user => {
  currentUser = user;
  renderNav('messages');

  conversationId = new URLSearchParams(window.location.search).get('conversation') || '';
  if (!conversationId) {
    threadLoadingEl.classList.add('hidden');
    threadErrorEl.classList.remove('hidden');
    return;
  }

  try {
    await openThread();
    startAutoRefresh();
  } catch (error) {
    threadLoadingEl.classList.add('hidden');
    threadErrorEl.classList.remove('hidden');
    showToast(error.message || 'Impossible de charger la conversation', 'error');
  }
});
</script>
</body>
</html>
