<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Scanner un code - MaintenanceBoard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-white">
  <main class="mx-auto flex min-h-screen max-w-lg flex-col px-4 py-5">
    <header class="mb-4 flex items-center justify-between gap-3">
      <div>
        <p class="text-xs font-medium uppercase tracking-wide text-slate-400">MaintenanceBoard</p>
        <h1 class="text-xl font-semibold">Scanner un équipement</h1>
      </div>
      <a href="/equipment.html" class="rounded-lg border border-white/15 px-3 py-2 text-sm text-slate-200 transition hover:bg-white/10">Retour</a>
    </header>

    <section class="relative overflow-hidden rounded-2xl border border-white/10 bg-black shadow-2xl">
      <div id="scan-reader" class="w-full"></div>
      <div id="camera-state" class="bg-slate-950/80 px-4 py-3 text-sm text-slate-200">
        Initialisation de la caméra...
      </div>
    </section>

    <section class="mt-4 rounded-2xl border border-white/10 bg-white/5 p-4">
      <label for="manual-code" class="mb-2 block text-sm font-medium text-slate-200">Code scanné ou numéro de série</label>
      <div class="flex gap-2">
        <input id="manual-code" type="text" autocomplete="off" inputmode="text"
          class="min-w-0 flex-1 rounded-xl border border-white/10 bg-slate-900 px-3 py-3 text-sm text-white outline-none transition placeholder:text-slate-500 focus:border-emerald-400 focus:ring-2 focus:ring-emerald-400/20"
          placeholder="SN-DELL-001" />
        <button id="manual-submit" type="button" class="rounded-xl bg-emerald-500 px-4 py-3 text-sm font-semibold text-slate-950 transition hover:bg-emerald-400">
          Ouvrir
        </button>
      </div>
      <p id="scan-error" class="mt-3 hidden rounded-xl border border-red-400/30 bg-red-500/10 px-3 py-2 text-sm text-red-100"></p>
    </section>
  </main>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="/js/api.js"></script>
  <script>
    const stateEl = document.getElementById('camera-state');
    const errorEl = document.getElementById('scan-error');
    const manualInput = document.getElementById('manual-code');
    const manualSubmit = document.getElementById('manual-submit');

    let scanner = null;
    let scanLock = false;

    function showError(message) {
      errorEl.textContent = message;
      errorEl.classList.remove('hidden');
    }

    function clearError() {
      errorEl.classList.add('hidden');
      errorEl.textContent = '';
    }

    async function resolveCode(code) {
      const value = String(code || '').trim();
      if (!value || scanLock) return;
      scanLock = true;
      clearError();
      stateEl.textContent = 'Code détecté, ouverture de la fiche...';

      if (scanner) {
        try { await scanner.stop(); } catch (_) {}
      }

      try {
        const result = await api.post('/qrcode/scan/resolve', { code: value });
        window.location.href = result.href || `/equipment.html?focus=${encodeURIComponent(result.data.id)}`;
      } catch (err) {
        scanLock = false;
        stateEl.textContent = 'Aucun équipement trouvé. Vous pouvez réessayer.';
        showError(err.message || 'Code non reconnu.');
        startScanner();
      }
    }

    async function startScanner() {
      await requireLogin();

      if (!window.Html5Qrcode) {
        stateEl.textContent = 'Bibliothèque de scan non chargée. Saisissez le numéro de série ci-dessous.';
        manualInput.focus();
        return;
      }

      try {
        scanner = new Html5Qrcode('scan-reader');
        await scanner.start(
          { facingMode: 'environment' },
          { fps: 10, qrbox: { width: 240, height: 240 }, aspectRatio: 1.33 },
          (decodedText) => resolveCode(decodedText),
          () => {}
        );
        stateEl.textContent = 'Visez un QR code ou un code-barres de numéro de série.';
      } catch (err) {
        stateEl.textContent = 'Caméra inaccessible. Saisissez le numéro de série ci-dessous.';
        showError(err.message || 'Impossible d\'ouvrir la caméra.');
        manualInput.focus();
      }
    }

    manualSubmit.addEventListener('click', () => resolveCode(manualInput.value));
    manualInput.addEventListener('keydown', event => {
      if (event.key === 'Enter') resolveCode(manualInput.value);
    });

    window.addEventListener('pagehide', () => {
      if (scanner) {
        try { scanner.stop(); } catch (_) {}
      }
    });

    startScanner();
  </script>
</body>
</html>
