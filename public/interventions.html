<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interventions – MaintenanceBoard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">

<div class="min-h-screen flex">
  <aside id="sidebar" class="w-64 bg-slate-800 flex flex-col fixed inset-y-0 left-0 z-40 -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out">
    <div class="flex items-center gap-3 px-5 py-5 border-b border-slate-700">
      <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h14a2 2 0 012 2v10a2 2 0 01-2 2h-2"/></svg>
      </div>
      <div><p class="text-white font-bold text-sm">MaintenanceBoard</p><p class="text-slate-400 text-xs">Parc informatique</p></div>
    </div>
    <nav id="main-nav" class="flex-1 p-3 space-y-1 overflow-y-auto"></nav>
    <div class="p-3 border-t border-slate-700">
      <div class="flex items-center gap-3 px-3 py-2">
        <div class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center text-white text-xs font-bold"><span id="user-avatar">?</span></div>
        <div class="flex-1 min-w-0"><p id="user-name" class="text-white text-sm font-medium truncate">...</p><p id="user-role" class="text-slate-400 text-xs"></p></div>
        <button id="logout-btn" class="text-slate-400 hover:text-red-400 transition">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <main class="flex-1 lg:ml-64 flex flex-col">
    <header class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between sticky top-0 z-20">
      <div class="flex items-center gap-3">
        <button onclick="toggleSidebar()" class="lg:hidden p-1.5 rounded-lg text-slate-500 hover:bg-slate-100 transition">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
        <h1 class="text-xl font-semibold text-slate-800">Interventions</h1>
      </div>
      <button id="add-intervention-btn" class="flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700 transition">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        Nouvelle intervention
      </button>
    </header>

    <div class="flex-1 p-6 space-y-4">
      <!-- Filtres -->
      <div class="bg-white rounded-xl border border-slate-200 p-4 flex gap-3 flex-wrap">
        <input id="search-input" type="search" placeholder="Rechercher..."
          class="flex-1 min-w-48 border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        <select id="status-filter" class="border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="">Tous les statuts</option>
          <option value="OPEN">Ouvert</option>
          <option value="IN_PROGRESS">En cours</option>
          <option value="RESOLVED">Résolu</option>
          <option value="CLOSED">Fermé</option>
        </select>
        <select id="priority-filter" class="border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="">Toutes priorités</option>
          <option value="LOW">Basse</option>
          <option value="NORMAL">Normale</option>
          <option value="HIGH">Haute</option>
          <option value="CRITICAL">Critique</option>
        </select>
      </div>

      <!-- Liste -->
      <div id="interventions-container" class="space-y-3">
        <p class="text-slate-400 text-center py-8">Chargement...</p>
      </div>
      <div id="pagination" class="flex items-center justify-between text-sm text-slate-500"></div>
    </div>
  </main>
</div>

<!-- Modal Intervention -->
<div id="intervention-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-screen overflow-y-auto">
    <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200 sticky top-0 bg-white">
      <h3 id="modal-title" class="font-semibold text-slate-800">Nouvelle intervention</h3>
      <button id="close-modal" class="text-slate-400 hover:text-slate-600">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <form id="intervention-form" class="p-6 space-y-4">
      <input type="hidden" id="intervention-id" />
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Titre *</label>
        <input id="int-title" type="text" required class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Statut</label>
          <select id="int-status" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="OPEN">Ouvert</option>
            <option value="IN_PROGRESS">En cours</option>
            <option value="RESOLVED">Résolu</option>
            <option value="CLOSED">Fermé</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Priorité</label>
          <select id="int-priority" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="LOW">Basse</option>
            <option value="NORMAL">Normale</option>
            <option value="HIGH">Haute</option>
            <option value="CRITICAL">Critique</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Salle</label>
          <select id="int-room" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="">-- Aucune --</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Équipement</label>
          <select id="int-equip" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="">-- Aucun --</option>
          </select>
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Description</label>
        <textarea id="int-description" rows="3" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
      </div>
      <div id="resolution-field" class="hidden">
        <label class="block text-sm font-medium text-slate-700 mb-1">Résolution</label>
        <textarea id="int-resolution" rows="2" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none" placeholder="Décrire comment le problème a été résolu..."></textarea>
      </div>
      <div id="form-error" class="hidden bg-red-50 border border-red-200 text-red-700 rounded-lg p-3 text-sm"></div>
      <div class="flex justify-end gap-3 pt-2">
        <button type="button" id="cancel-modal" class="px-4 py-2 border border-slate-300 rounded-lg text-sm hover:bg-slate-50 transition">Annuler</button>
        <button type="submit" id="submit-btn" class="px-6 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700 transition disabled:opacity-50">Enregistrer</button>
      </div>
    </form>
  </div>
</div>

<!-- Modal Photos -->
<div id="photos-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg">
    <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200">
      <h3 class="font-semibold text-slate-800">Ajouter des photos</h3>
      <button id="close-photos-modal" class="text-slate-400 hover:text-slate-600">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="p-6 space-y-4">
      <input type="hidden" id="photos-intervention-id" />
      <input id="photos-input" type="file" multiple accept="image/*" capture="environment"
        class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm" />
      <div id="photos-preview" class="flex gap-2 flex-wrap"></div>
      <div class="flex justify-end gap-3">
        <button id="cancel-photos" class="px-4 py-2 border border-slate-300 rounded-lg text-sm hover:bg-slate-50 transition">Annuler</button>
        <button id="upload-photos-btn" class="px-6 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700 transition">Envoyer</button>
      </div>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/layout.js"></script>
<script>
const user = requireLogin();
if (!user) throw new Error('Not logged in');
renderNav('interventions');
if (user.name) document.getElementById('user-avatar').textContent = user.name[0].toUpperCase();

let currentPage = 1, currentSearch = '', currentStatus = '', currentPriority = '';

async function loadInterventions() {
  const container = document.getElementById('interventions-container');
  container.innerHTML = '<p class="text-slate-400 text-center py-8">Chargement...</p>';
  try {
    const params = { page: currentPage, limit: 20 };
    if (currentSearch) params.search = currentSearch;
    if (currentStatus) params.status = currentStatus;
    if (currentPriority) params.priority = currentPriority;

    const data = await api.get('/interventions', params);

    if (data.data.length === 0) {
      container.innerHTML = `<div class="text-center py-12 text-slate-400">
        <svg class="w-12 h-12 mx-auto text-slate-300 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
        </svg>
        <p>Aucune intervention trouvée</p>
      </div>`;
      document.getElementById('pagination').innerHTML = '';
      return;
    }

    const priorityBorderColor = { LOW: 'border-l-slate-300', NORMAL: 'border-l-blue-400', HIGH: 'border-l-orange-400', CRITICAL: 'border-l-red-500' };

    container.innerHTML = data.data.map(i => `
      <div class="bg-white rounded-xl border border-slate-200 border-l-4 ${priorityBorderColor[i.priority] || 'border-l-blue-400'} p-5 hover:shadow-sm transition">
        <div class="flex items-start justify-between gap-4">
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 flex-wrap mb-1">
              <h3 class="font-semibold text-slate-800">${i.title}</h3>
              ${statusBadge(i.status)}
              ${i.priority !== 'NORMAL' ? statusBadge(i.priority) : ''}
            </div>
            ${i.description ? `<p class="text-sm text-slate-600 mt-1 line-clamp-2">${i.description}</p>` : ''}
            <div class="flex items-center gap-4 mt-2 text-xs text-slate-500">
              ${i.room ? `<span>📍 ${i.room.name}${i.room.number ? ` (${i.room.number})` : ''}</span>` : ''}
              ${i.equipment ? `<span>🖥️ ${i.equipment.name}</span>` : ''}
              <span>👤 ${i.tech?.name || 'N/A'}</span>
              <span>📅 ${formatDate(i.createdAt, true)}</span>
              ${i.photos?.length ? `<span>📷 ${i.photos.length} photo(s)</span>` : ''}
            </div>
          </div>
          <div class="flex items-center gap-2 flex-shrink-0">
            <button onclick="openPhotosModal('${i.id}')"
              class="p-1.5 rounded-lg hover:bg-slate-100 text-slate-500 hover:text-blue-600 transition" title="Ajouter photos">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            </button>
            <button onclick="editIntervention(${JSON.stringify(i).replace(/"/g, '&quot;')})"
              class="p-1.5 rounded-lg hover:bg-slate-100 text-slate-500 hover:text-blue-600 transition">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
            </button>
            ${user.role === 'ADMIN' ? `
            <button onclick="deleteIntervention('${i.id}')"
              class="p-1.5 rounded-lg hover:bg-slate-100 text-slate-500 hover:text-red-600 transition">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
            </button>` : ''}
          </div>
        </div>
      </div>
    `).join('');

    const { page, totalPages, total } = data.pagination;
    document.getElementById('pagination').innerHTML = `
      <span>${total} intervention(s)</span>
      <div class="flex gap-2">
        <button onclick="changePage(${page-1})" ${page<=1?'disabled':''} class="px-3 py-1.5 border border-slate-300 rounded-lg text-xs disabled:opacity-40 hover:bg-slate-50">Précédent</button>
        <span class="px-3 py-1.5 text-xs">${page} / ${totalPages}</span>
        <button onclick="changePage(${page+1})" ${page>=totalPages?'disabled':''} class="px-3 py-1.5 border border-slate-300 rounded-lg text-xs disabled:opacity-40 hover:bg-slate-50">Suivant</button>
      </div>`;
  } catch (err) {
    container.innerHTML = `<p class="text-red-500 text-center py-8">Erreur : ${err.message}</p>`;
  }
}

function changePage(p) { currentPage = p; loadInterventions(); }

let searchTimeout;
document.getElementById('search-input').addEventListener('input', e => { clearTimeout(searchTimeout); searchTimeout = setTimeout(() => { currentSearch = e.target.value; currentPage = 1; loadInterventions(); }, 400); });
document.getElementById('status-filter').addEventListener('change', e => { currentStatus = e.target.value; currentPage = 1; loadInterventions(); });
document.getElementById('priority-filter').addEventListener('change', e => { currentPriority = e.target.value; currentPage = 1; loadInterventions(); });

async function loadSelects(roomId, equipId) {
  try {
    const [rooms, equips] = await Promise.all([
      api.get('/rooms', { limit: 200 }),
      api.get('/equipment', { limit: 500 })
    ]);
    document.getElementById('int-room').innerHTML = '<option value="">-- Aucune --</option>' +
      rooms.data.map(r => `<option value="${r.id}" ${r.id === roomId ? 'selected' : ''}>${r.name}${r.number ? ` (${r.number})` : ''}</option>`).join('');
    document.getElementById('int-equip').innerHTML = '<option value="">-- Aucun --</option>' +
      equips.data.map(e => `<option value="${e.id}" ${e.id === equipId ? 'selected' : ''}>${e.name} (${e.type})</option>`).join('');
  } catch {}
}

const modal = document.getElementById('intervention-modal');
document.getElementById('add-intervention-btn').addEventListener('click', () => {
  document.getElementById('modal-title').textContent = 'Nouvelle intervention';
  document.getElementById('intervention-id').value = '';
  document.getElementById('intervention-form').reset();
  document.getElementById('form-error').classList.add('hidden');
  document.getElementById('resolution-field').classList.add('hidden');
  loadSelects(null, null);
  modal.classList.remove('hidden');
});
document.getElementById('close-modal').addEventListener('click', () => modal.classList.add('hidden'));
document.getElementById('cancel-modal').addEventListener('click', () => modal.classList.add('hidden'));

document.getElementById('int-status').addEventListener('change', e => {
  const rf = document.getElementById('resolution-field');
  if (e.target.value === 'RESOLVED' || e.target.value === 'CLOSED') rf.classList.remove('hidden');
  else rf.classList.add('hidden');
});

function editIntervention(i) {
  document.getElementById('modal-title').textContent = 'Modifier l\'intervention';
  document.getElementById('intervention-id').value = i.id;
  document.getElementById('int-title').value = i.title;
  document.getElementById('int-status').value = i.status;
  document.getElementById('int-priority').value = i.priority;
  document.getElementById('int-description').value = i.description || '';
  document.getElementById('int-resolution').value = i.resolution || '';
  document.getElementById('form-error').classList.add('hidden');
  if (i.status === 'RESOLVED' || i.status === 'CLOSED') {
    document.getElementById('resolution-field').classList.remove('hidden');
  } else {
    document.getElementById('resolution-field').classList.add('hidden');
  }
  loadSelects(i.roomId, i.equipmentId);
  modal.classList.remove('hidden');
}

document.getElementById('intervention-form').addEventListener('submit', async e => {
  e.preventDefault();
  const id = document.getElementById('intervention-id').value;
  const data = {
    title: document.getElementById('int-title').value,
    status: document.getElementById('int-status').value,
    priority: document.getElementById('int-priority').value,
    description: document.getElementById('int-description').value || null,
    resolution: document.getElementById('int-resolution').value || null,
    roomId: document.getElementById('int-room').value || null,
    equipmentId: document.getElementById('int-equip').value || null
  };

  const submitBtn = document.getElementById('submit-btn');
  submitBtn.disabled = true;
  document.getElementById('form-error').classList.add('hidden');
  try {
    if (id) {
      await api.patch(`/interventions/${id}`, data);
      showToast('Intervention mise à jour');
    } else {
      await api.post('/interventions', data);
      showToast('Intervention créée');
    }
    modal.classList.add('hidden');
    loadInterventions();
  } catch (err) {
    const errEl = document.getElementById('form-error');
    errEl.textContent = err.message;
    errEl.classList.remove('hidden');
  } finally { submitBtn.disabled = false; }
});

async function deleteIntervention(id) {
  if (!confirm('Supprimer cette intervention ?')) return;
  try {
    await api.delete(`/interventions/${id}`);
    showToast('Intervention supprimée');
    loadInterventions();
  } catch (err) { showToast(err.message, 'error'); }
}

// Photos
const photosModal = document.getElementById('photos-modal');
function openPhotosModal(id) {
  document.getElementById('photos-intervention-id').value = id;
  document.getElementById('photos-input').value = '';
  document.getElementById('photos-preview').innerHTML = '';
  photosModal.classList.remove('hidden');
}
document.getElementById('close-photos-modal').addEventListener('click', () => photosModal.classList.add('hidden'));
document.getElementById('cancel-photos').addEventListener('click', () => photosModal.classList.add('hidden'));

document.getElementById('photos-input').addEventListener('change', e => {
  const preview = document.getElementById('photos-preview');
  preview.innerHTML = '';
  for (const file of e.target.files) {
    const img = document.createElement('img');
    img.src = URL.createObjectURL(file);
    img.className = 'w-20 h-20 object-cover rounded-lg border border-slate-200';
    preview.appendChild(img);
  }
});

document.getElementById('upload-photos-btn').addEventListener('click', async () => {
  const id = document.getElementById('photos-intervention-id').value;
  const files = document.getElementById('photos-input').files;
  if (!files.length) return showToast('Sélectionnez des photos', 'warning');

  const fd = new FormData();
  for (const f of files) fd.append('photos', f);

  try {
    await api.upload(`/interventions/${id}/photos`, fd);
    showToast('Photos ajoutées');
    photosModal.classList.add('hidden');
    loadInterventions();
  } catch (err) { showToast(err.message, 'error'); }
});

loadInterventions();
</script>
</body>
</html>
