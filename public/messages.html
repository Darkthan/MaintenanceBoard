<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Messagerie interne – MaintenanceBoard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">

<div class="min-h-screen flex">
  <aside id="sidebar" class="w-64 bg-slate-800 flex flex-col fixed inset-y-0 left-0 z-40 -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out">
    <div class="flex items-center gap-3 px-5 py-5 border-b border-slate-700">
      <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8h16M4 8l8 6 8-6M4 16h16" />
        </svg>
      </div>
      <div>
        <p class="text-white font-bold text-sm">MaintenanceBoard</p>
        <p class="text-slate-400 text-xs">Messagerie interne</p>
      </div>
    </div>
    <nav id="main-nav" class="flex-1 p-3 space-y-1 overflow-y-auto"></nav>
    <div class="p-3 border-t border-slate-700">
      <div class="flex items-center gap-3 px-3 py-2">
        <div class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center text-white text-xs font-bold">
          <span id="user-avatar">?</span>
        </div>
        <div class="flex-1 min-w-0">
          <p id="user-name" class="text-white text-sm font-medium truncate">...</p>
          <p id="user-role" class="text-slate-400 text-xs"></p>
        </div>
        <button id="logout-btn" class="text-slate-400 hover:text-red-400 transition">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
        </button>
      </div>
    </div>
  </aside>

  <main class="flex-1 lg:ml-64 flex flex-col">
    <header class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between sticky top-0 z-20">
      <div class="flex items-center gap-3">
        <button onclick="toggleSidebar()" class="lg:hidden p-1.5 rounded-lg text-slate-500 hover:bg-slate-100 transition">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
        <div>
          <h1 class="text-xl font-semibold text-slate-800">Messagerie interne</h1>
          <p class="text-sm text-slate-500">Retrouve tes conversations puis crée un nouveau fil avec le bouton +.</p>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <button id="new-conversation-btn" type="button"
          class="inline-flex h-10 w-10 items-center justify-center rounded-full bg-blue-600 text-white shadow-sm transition hover:bg-blue-700"
          aria-label="Nouvelle conversation" title="Nouvelle conversation">
          <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
          </svg>
        </button>
        <button id="refresh-btn" type="button" class="text-sm text-blue-600 hover:text-blue-700 transition">Rafraîchir</button>
      </div>
    </header>

    <div class="flex-1 p-6">
      <section class="bg-white rounded-2xl border border-slate-200 p-5 min-h-[520px]">
        <div class="flex items-center justify-between gap-3">
          <div>
            <p class="text-xs font-semibold uppercase tracking-wide text-slate-400">Boîte de réception</p>
            <h2 class="text-lg font-semibold text-slate-800">Conversations</h2>
          </div>
          <span id="conversation-count" class="text-xs text-slate-400">0 conversation</span>
        </div>
        <div id="conversation-list" class="mt-4 space-y-3">
          <p class="text-sm text-slate-400 text-center py-10">Chargement...</p>
        </div>
      </section>
    </div>
  </main>
</div>

<div id="new-conversation-modal" class="hidden fixed inset-0 z-50 items-center justify-center bg-black/50 p-4">
  <div class="w-full max-w-lg rounded-2xl bg-white shadow-2xl">
    <div class="flex items-center justify-between border-b border-slate-200 px-6 py-4">
      <div>
        <p class="text-xs font-semibold uppercase tracking-wide text-slate-400">Nouveau message</p>
        <h2 class="text-lg font-semibold text-slate-800">Choisir un contact</h2>
      </div>
      <button id="close-new-conversation-btn" type="button" class="text-slate-400 hover:text-slate-600 transition">
        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
    <div class="px-6 py-5 space-y-4">
      <p id="contacts-count" class="text-sm text-slate-500">0 contact disponible</p>
      <select id="recipient-select" class="w-full rounded-xl border border-slate-300 px-3 py-2.5 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option value="">Sélectionner un utilisateur</option>
      </select>
      <div id="contacts-list" class="max-h-72 space-y-2 overflow-y-auto rounded-2xl border border-slate-200 bg-slate-50 p-3">
        <p class="text-sm text-slate-400 text-center py-6">Chargement...</p>
      </div>
    </div>
    <div class="flex items-center justify-end gap-3 border-t border-slate-200 px-6 py-4">
      <button id="cancel-new-conversation-btn" type="button" class="rounded-xl border border-slate-300 px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 transition">
        Annuler
      </button>
      <button id="open-conversation-btn" type="button" class="rounded-xl bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700 transition">
        Ouvrir la conversation
      </button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/layout.js"></script>
<script>
let recipients = [];
let conversations = [];

const recipientSelect = document.getElementById('recipient-select');
const newConversationModalEl = document.getElementById('new-conversation-modal');
const contactsListEl = document.getElementById('contacts-list');
const contactsCountEl = document.getElementById('contacts-count');
const conversationListEl = document.getElementById('conversation-list');
const conversationCountEl = document.getElementById('conversation-count');

function escapeHtml(value) {
  return String(value || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function formatDateTime(value) {
  if (!value) return '';
  return new Date(value).toLocaleString('fr-FR', {
    day: '2-digit',
    month: '2-digit',
    year: 'numeric',
    hour: '2-digit',
    minute: '2-digit'
  });
}

function formatRelative(value) {
  if (!value) return '';
  const then = new Date(value).getTime();
  const diffMinutes = Math.round((Date.now() - then) / 60000);
  if (diffMinutes < 1) return 'à l’instant';
  if (diffMinutes < 60) return `il y a ${diffMinutes} min`;
  const diffHours = Math.round(diffMinutes / 60);
  if (diffHours < 24) return `il y a ${diffHours} h`;
  return formatDateTime(value);
}

function threadUrl(conversationId) {
  return `/messages-thread.html?conversation=${encodeURIComponent(conversationId)}`;
}

function renderRecipients() {
  contactsCountEl.textContent = `${recipients.length} contact${recipients.length > 1 ? 's' : ''}`;
  recipientSelect.innerHTML = `
    <option value="">Sélectionner un utilisateur</option>
    ${recipients.map(user => `
      <option value="${user.id}">${escapeHtml(user.name)}${user.email ? ` (${escapeHtml(user.email)})` : ''}</option>
    `).join('')}
  `;

  if (!recipients.length) {
    contactsListEl.innerHTML = '<p class="text-sm text-slate-400 text-center py-6">Aucun contact disponible.</p>';
    return;
  }

  contactsListEl.innerHTML = recipients.map(user => `
    <button type="button" data-recipient-id="${user.id}"
      class="w-full rounded-2xl border border-slate-200 bg-white p-4 text-left transition hover:border-blue-200 hover:bg-blue-50">
      <div class="flex items-start justify-between gap-3">
        <div class="min-w-0">
          <p class="text-sm font-semibold text-slate-800 truncate">${escapeHtml(user.name)}</p>
          <p class="mt-1 text-xs uppercase tracking-wide text-slate-400">${escapeHtml(user.role || '')}</p>
          <p class="mt-2 text-xs text-slate-500 truncate">${escapeHtml(user.email || '')}</p>
        </div>
        <span class="rounded-full bg-white px-2.5 py-1 text-[11px] font-medium text-blue-700 border border-slate-200">Ouvrir</span>
      </div>
    </button>
  `).join('');

  contactsListEl.querySelectorAll('[data-recipient-id]').forEach(button => {
    button.addEventListener('click', () => openConversationForRecipient(button.dataset.recipientId));
  });
}

function renderConversations() {
  conversationCountEl.textContent = `${conversations.length} conversation${conversations.length > 1 ? 's' : ''}`;

  if (!conversations.length) {
    conversationListEl.innerHTML = '<p class="text-sm text-slate-400 text-center py-10">Aucune conversation pour le moment.</p>';
    return;
  }

  conversationListEl.innerHTML = conversations.map(conversation => {
    const name = conversation.otherParticipant?.name || 'Conversation';
    const preview = conversation.lastMessage?.content || conversation.lastMessage?.attachmentName || 'Aucun message';
    const unreadBadge = conversation.unreadCount
      ? `<span class="inline-flex min-w-6 justify-center rounded-full bg-blue-600 px-2 py-0.5 text-[11px] font-semibold text-white">${conversation.unreadCount}</span>`
      : '';

    return `
      <a href="${threadUrl(conversation.id)}"
        class="block rounded-2xl border border-slate-200 bg-white px-4 py-4 transition hover:border-slate-300 hover:bg-slate-50">
        <div class="flex items-start justify-between gap-3">
          <div class="min-w-0">
            <div class="flex items-center gap-2">
              <p class="text-sm font-semibold text-slate-800 truncate">${escapeHtml(name)}</p>
              ${unreadBadge}
            </div>
            <p class="mt-1 text-xs text-slate-500 truncate">${escapeHtml(preview)}</p>
          </div>
          <span class="text-[11px] text-slate-400 whitespace-nowrap">${escapeHtml(formatRelative(conversation.lastMessage?.createdAt || conversation.updatedAt))}</span>
        </div>
      </a>
    `;
  }).join('');
}

async function loadRecipients() {
  recipients = await api.get('/messages/users');
  renderRecipients();
}

async function loadConversations() {
  conversations = await api.get('/messages/conversations');
  renderConversations();
}

async function openConversationForRecipient(recipientId) {
  if (!recipientId) {
    showToast('Sélectionnez un utilisateur', 'error');
    return;
  }

  const conversation = await api.post('/messages/conversations', { recipientId });
  window.location.href = threadUrl(conversation.id);
}

function openNewConversationModal() {
  newConversationModalEl.classList.remove('hidden');
  newConversationModalEl.classList.add('flex');
}

function closeNewConversationModal() {
  newConversationModalEl.classList.add('hidden');
  newConversationModalEl.classList.remove('flex');
  recipientSelect.value = '';
}

document.getElementById('open-conversation-btn').addEventListener('click', async () => {
  try {
    await openConversationForRecipient(recipientSelect.value);
  } catch (error) {
    showToast(error.message || 'Ouverture impossible', 'error');
  }
});

document.getElementById('refresh-btn').addEventListener('click', async () => {
  try {
    await Promise.all([loadRecipients(), loadConversations()]);
  } catch (error) {
    showToast(error.message || 'Rafraîchissement impossible', 'error');
  }
});

document.getElementById('new-conversation-btn').addEventListener('click', openNewConversationModal);
document.getElementById('close-new-conversation-btn').addEventListener('click', closeNewConversationModal);
document.getElementById('cancel-new-conversation-btn').addEventListener('click', closeNewConversationModal);
newConversationModalEl.addEventListener('click', event => {
  if (event.target === newConversationModalEl) closeNewConversationModal();
});

requireLogin().then(async user => {
  renderNav('messages');
  try {
    await Promise.all([loadRecipients(), loadConversations()]);
  } catch (error) {
    showToast(error.message || 'Erreur lors du chargement de la messagerie', 'error');
  }
});
</script>
</body>
</html>
