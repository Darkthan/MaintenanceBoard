<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Écran d'affichage | MaintenanceBoard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <main class="mx-auto min-h-screen max-w-7xl px-5 py-6 sm:px-8 sm:py-8">
    <header class="flex flex-col gap-4 rounded-[28px] border border-white/10 bg-white/5 px-6 py-5 shadow-2xl shadow-slate-950/40 lg:flex-row lg:items-end lg:justify-between">
      <div>
        <p class="text-xs font-semibold uppercase tracking-[0.3em] text-slate-400">MaintenanceBoard</p>
        <h1 id="screen-title" class="mt-2 text-3xl font-semibold tracking-tight text-white sm:text-4xl">Écran d'affichage</h1>
        <p id="screen-subtitle" class="mt-2 text-sm text-slate-400">Chargement des informations…</p>
      </div>
      <div class="flex flex-wrap items-center gap-3 text-sm">
        <div class="rounded-full border border-white/10 bg-white/5 px-4 py-2 text-slate-300">
          <span class="text-slate-500">Dernière mise à jour :</span>
          <span id="screen-updated" class="ml-2 font-medium text-white">—</span>
        </div>
        <div id="screen-alert-pill" class="hidden rounded-full border border-rose-500/30 bg-rose-500/15 px-4 py-2 font-medium text-rose-200">
          Alerte en cours
        </div>
      </div>
    </header>

    <div id="screen-error" class="hidden mt-6 rounded-[24px] border border-rose-500/30 bg-rose-950/60 px-6 py-5 text-rose-100"></div>
    <div id="display-grid" class="mt-6 grid gap-5 lg:grid-cols-2 xl:grid-cols-6 items-start"></div>
  </main>

  <script>
    const token = (() => {
      const pathParts = window.location.pathname.split('/').filter(Boolean);
      const fromPath = pathParts[0] === 'screen' ? pathParts[pathParts.length - 1] : '';
      return decodeURIComponent(fromPath || new URLSearchParams(window.location.search).get('token') || '');
    })();

    let refreshTimer = null;
    let countdownTimer = null;

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function formatDateTime(value) {
      return new Date(value).toLocaleString('fr-FR', {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function formatCountdownText(targetValue) {
      const diffMs = new Date(targetValue).getTime() - Date.now();
      if (!Number.isFinite(diffMs) || diffMs <= 0) {
        return 'Maintenant';
      }

      const totalMinutes = Math.floor(diffMs / 60000);
      const days = Math.floor(totalMinutes / (24 * 60));
      const hours = Math.floor((totalMinutes % (24 * 60)) / 60);
      const minutes = totalMinutes % 60;
      const parts = [];

      if (days > 0) parts.push(`${days}j`);
      if (hours > 0 || days > 0) parts.push(`${hours}h`);
      parts.push(`${minutes}min`);

      return `Dans ${parts.join(' ')}`;
    }

    function updateCountdowns() {
      document.querySelectorAll('[data-countdown-to]').forEach(element => {
        element.textContent = formatCountdownText(element.dataset.countdownTo);
      });
    }

    function startCountdowns() {
      window.clearInterval(countdownTimer);
      updateCountdowns();
      if (!document.querySelector('[data-countdown-to]')) return;
      countdownTimer = window.setInterval(updateCountdowns, 1000);
    }

    function getWidgetSpanClasses(widget) {
      const size = widget.layout?.size || 'compact';
      if (size === 'hero') return 'lg:col-span-2 xl:col-span-6';
      if (size === 'wide') return 'lg:col-span-2 xl:col-span-3';
      return 'lg:col-span-1 xl:col-span-2';
    }

    function widgetShell(widget, innerHtml) {
      const classes = widget.tone === 'alert'
        ? 'border-rose-500/30 bg-rose-950/50'
        : 'border-white/10 bg-white/5';
      const tone = widget.tone === 'alert' ? 'text-rose-200' : 'text-slate-300';
      return `
        <section class="rounded-[28px] border ${classes} px-6 py-5 shadow-xl shadow-slate-950/30 ${getWidgetSpanClasses(widget)}">
          <div class="mb-5 flex items-center justify-between gap-3">
            <div>
              <h2 class="text-xl font-semibold text-white">${escapeHtml(widget.title)}</h2>
              <p class="mt-1 text-sm ${tone}">
                ${widget.tone === 'alert' ? 'Action requise' : 'Information de supervision'}
              </p>
            </div>
            <span class="inline-flex items-center rounded-full px-3 py-1 text-xs font-semibold ${widget.tone === 'alert' ? 'bg-rose-500/20 text-rose-100' : 'bg-white/10 text-slate-300'}">
              ${widget.tone === 'alert' ? 'Alerte' : 'OK'}
            </span>
          </div>
          ${innerHtml}
        </section>
      `;
    }

    function renderOverview(widget) {
      const statsGridClass = widget.layout?.size === 'hero'
        ? 'grid grid-cols-1 gap-4 md:grid-cols-2 xl:grid-cols-3'
        : widget.layout?.size === 'wide'
          ? 'grid grid-cols-1 gap-4 md:grid-cols-2'
          : 'grid grid-cols-1 gap-4';
      const stats = (widget.stats || []).map(stat => `
        <article class="rounded-2xl border ${stat.alert ? 'border-rose-500/30 bg-rose-950/50' : 'border-white/10 bg-slate-900/40'} px-4 py-4">
          <p class="text-xs font-semibold uppercase tracking-[0.2em] ${stat.alert ? 'text-rose-200' : 'text-slate-400'}">${escapeHtml(stat.label)}</p>
          <p class="mt-3 text-4xl font-semibold ${stat.alert ? 'text-rose-100' : 'text-white'}">
            ${stat.countdownTo
              ? `<span data-countdown-to="${escapeHtml(stat.countdownTo)}">${escapeHtml(stat.value)}</span>`
              : escapeHtml(stat.value)}
          </p>
          <p class="mt-2 text-sm ${stat.alert ? 'text-rose-200' : 'text-slate-400'}">${escapeHtml(stat.description || '')}</p>
        </article>
      `).join('');

      return widgetShell(widget, `<div class="${statsGridClass}">${stats}</div>`);
    }

    function renderListWidget(widget) {
      const items = widget.items || [];
      const body = items.length
        ? `<div class="space-y-3">
            ${items.map(item => `
              <article class="rounded-2xl border ${item.alert ? 'border-rose-500/25 bg-rose-950/40' : 'border-white/10 bg-slate-900/40'} px-4 py-4">
                <div class="flex items-start justify-between gap-3">
                  <div class="min-w-0 flex-1">
                    <p class="text-base font-semibold ${item.alert ? 'text-rose-50' : 'text-white'}">${escapeHtml(item.title)}</p>
                    ${item.subtitle ? `<p class="mt-1 text-sm ${item.alert ? 'text-rose-200' : 'text-slate-300'}">${escapeHtml(item.subtitle)}</p>` : ''}
                    ${item.meta ? `<p class="mt-2 text-xs uppercase tracking-[0.18em] ${item.alert ? 'text-rose-300' : 'text-slate-500'}">${escapeHtml(item.meta)}</p>` : ''}
                  </div>
                  <span class="mt-1 inline-flex h-3 w-3 flex-shrink-0 rounded-full ${item.alert ? 'bg-rose-400' : 'bg-emerald-400'}"></span>
                </div>
              </article>
            `).join('')}
          </div>`
        : `<div class="rounded-2xl border border-white/10 bg-slate-900/30 px-5 py-6 text-center text-slate-400">${escapeHtml(widget.emptyLabel || 'Aucune donnée')}</div>`;

      return widgetShell(widget, body);
    }

    function renderWidget(widget) {
      if (widget.kind === 'overview') return renderOverview(widget);
      return renderListWidget(widget);
    }

    function scheduleRefresh(seconds) {
      window.clearTimeout(refreshTimer);
      if (!seconds || seconds < 15) return;
      refreshTimer = window.setTimeout(loadScreen, seconds * 1000);
    }

    async function loadScreen() {
      const errorEl = document.getElementById('screen-error');
      const gridEl = document.getElementById('display-grid');
      const alertPill = document.getElementById('screen-alert-pill');

      if (!token) {
        errorEl.textContent = 'Token écran manquant.';
        errorEl.classList.remove('hidden');
        gridEl.innerHTML = '';
        return;
      }

      try {
        const response = await fetch(`/api/display/${encodeURIComponent(token)}`, { cache: 'no-store' });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || `Erreur ${response.status}`);

        errorEl.classList.add('hidden');
        document.getElementById('screen-title').textContent = payload.screen?.name || 'Écran d’affichage';
        document.getElementById('screen-subtitle').textContent = `${(payload.widgets || []).length} bloc(s) affiché(s) · ${payload.screen?.layoutMode === 'MANUAL' ? 'agencement personnalisé' : 'agencement dynamique'} · rafraîchissement toutes les ${payload.screen?.refreshSeconds || 30} secondes`;
        document.getElementById('screen-updated').textContent = formatDateTime(payload.generatedAt);
        alertPill.classList.toggle('hidden', !(payload.alertCount > 0));

        gridEl.innerHTML = (payload.widgets || []).map(renderWidget).join('');
        startCountdowns();
        scheduleRefresh(payload.screen?.refreshSeconds || 30);
      } catch (err) {
        errorEl.textContent = err.message || 'Impossible de charger l’écran.';
        errorEl.classList.remove('hidden');
        gridEl.innerHTML = '';
        window.clearInterval(countdownTimer);
        scheduleRefresh(30);
      }
    }

    loadScreen();
  </script>
</body>
</html>
