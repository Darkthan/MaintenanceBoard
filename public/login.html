<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion – MaintenanceBoard</title>
  <link rel="icon" href="/assets/app-logo.svg" type="image/svg+xml" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="MaintBoard" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@simplewebauthn/browser@9.0.1/dist/bundle/index.umd.min.js"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { brand: { 50: '#eff6ff', 600: '#2563eb', 700: '#1d4ed8' } } } }
    }
  </script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 to-slate-700 flex items-center justify-center p-4">

  <div class="w-full max-w-md">
    <!-- Logo / Titre -->
    <div class="text-center mb-8">
      <img src="/assets/app-logo.svg" alt="MaintenanceBoard" class="w-16 h-16 mx-auto mb-4 rounded-2xl shadow-2xl shadow-blue-950/30" />
      <h1 class="text-3xl font-bold text-white">MaintenanceBoard</h1>
      <p class="text-slate-400 mt-1">Gestion du parc informatique</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <h2 class="text-xl font-semibold text-slate-800 mb-6 text-center">Connexion</h2>

      <!-- Erreur -->
      <div id="login-error" class="hidden bg-red-50 border border-red-200 text-red-700 rounded-lg p-3 mb-5 text-sm"></div>

      <!-- Formulaire mot de passe -->
      <form id="login-form" class="space-y-4">
        <div>
          <label for="email" class="block text-sm font-medium text-slate-700 mb-1">Email</label>
          <input id="email" type="email" required autocomplete="username email"
            class="w-full border border-slate-300 rounded-lg px-4 py-2.5 text-slate-800 placeholder-slate-400
                   focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
            placeholder="admin@maintenance.local" />
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Mot de passe</label>
          <div class="relative">
            <input id="password" type="password" required autocomplete="current-password"
              class="w-full border border-slate-300 rounded-lg px-4 py-2.5 text-slate-800 placeholder-slate-400
                     focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
              placeholder="••••••••" />
            <button type="button" id="toggle-pwd"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7
                     -1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
            </button>
          </div>
        </div>
        <button type="submit"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 px-4 rounded-lg
                 transition focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2
                 disabled:opacity-50 disabled:cursor-not-allowed">
          Se connecter
        </button>
      </form>

      <!-- Séparateur -->
      <div class="flex items-center my-5">
        <div class="flex-1 border-t border-slate-200"></div>
        <span class="mx-3 text-sm text-slate-400">ou</span>
        <div class="flex-1 border-t border-slate-200"></div>
      </div>

      <!-- Passkey -->
      <button id="passkey-login-btn"
        class="w-full flex items-center justify-center gap-3 border-2 border-slate-200 hover:border-blue-400
               text-slate-700 hover:text-blue-700 font-semibold py-2.5 px-4 rounded-lg transition
               focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2
               disabled:opacity-40 disabled:cursor-not-allowed">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 11c0-1.657-1.343-3-3-3S6 9.343 6 11s1.343 3 3 3c.601 0 1.159-.177 1.628-.481
               M12 11v2m0 4h.01M7 21h10a2 2 0 002-2v-6a2 2 0 00-2-2H7a2 2 0 00-2 2v6a2 2 0 002 2z" />
        </svg>
        Se connecter avec une clé (Passkey)
      </button>

      <p class="text-center text-xs text-slate-400 mt-5">
        Empreinte digitale · Face ID · Clé de sécurité
      </p>
    </div>

    <p class="text-center text-slate-500 text-sm mt-4">
      MaintenanceBoard v1.0 &mdash;
      <a href="/api-docs" target="_blank" class="underline hover:text-white">API Docs</a>
    </p>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    // Toggle password visibility
    document.getElementById('toggle-pwd')?.addEventListener('click', () => {
      const pwd = document.getElementById('password');
      pwd.type = pwd.type === 'password' ? 'text' : 'password';
    });

    initLoginPage();
  </script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
</body>
</html>
