<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Tâches – MaintenanceBoard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">

<div class="min-h-screen flex">
  <aside id="sidebar" class="w-64 bg-slate-800 flex flex-col fixed inset-y-0 left-0 z-40 -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out">
    <div class="flex items-center gap-3 px-5 py-5 border-b border-slate-700">
      <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
        </svg>
      </div>
      <div>
        <p class="text-white font-bold text-sm">MaintenanceBoard</p>
        <p class="text-slate-400 text-xs">Tâches</p>
      </div>
    </div>
    <nav id="main-nav" class="flex-1 p-3 space-y-1 overflow-y-auto"></nav>
    <div class="p-3 border-t border-slate-700">
      <div class="flex items-center gap-3 px-3 py-2">
        <div class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center text-white text-xs font-bold">
          <span id="user-avatar">?</span>
        </div>
        <div class="flex-1 min-w-0">
          <p id="user-name" class="text-white text-sm font-medium truncate">...</p>
          <p id="user-role" class="text-slate-400 text-xs"></p>
        </div>
        <button id="logout-btn" class="text-slate-400 hover:text-red-400 transition">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
        </button>
      </div>
    </div>
  </aside>

  <main class="flex-1 lg:ml-64 flex flex-col">
    <header class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between sticky top-0 z-20">
      <div class="flex items-center gap-3">
        <button onclick="toggleSidebar()" class="lg:hidden p-1.5 rounded-lg text-slate-500 hover:bg-slate-100 transition">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
        <div>
          <h1 class="text-xl font-semibold text-slate-800">Tâches</h1>
          <p class="text-sm text-slate-500">Vue globale des tâches liées aux interventions.</p>
        </div>
      </div>
      <button onclick="openTodoModal()" class="inline-flex items-center gap-2 px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-xl hover:bg-blue-700 transition shadow-sm">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
        Nouvelle tâche
      </button>
    </header>

    <div class="p-6 flex-1">
      <!-- Filtres -->
      <div class="flex gap-2 mb-6 flex-wrap">
        <button onclick="setFilter('all')" id="filter-all"
          class="filter-btn px-4 py-2 rounded-xl text-sm font-medium transition bg-blue-600 text-white shadow-sm">
          Toutes
        </button>
        <button onclick="setFilter('pending')" id="filter-pending"
          class="filter-btn px-4 py-2 rounded-xl text-sm font-medium transition bg-white text-slate-600 border border-slate-200 hover:bg-slate-50">
          En cours
        </button>
        <button onclick="setFilter('overdue')" id="filter-overdue"
          class="filter-btn px-4 py-2 rounded-xl text-sm font-medium transition bg-white text-slate-600 border border-slate-200 hover:bg-slate-50">
          En retard
        </button>
        <button onclick="setFilter('done')" id="filter-done"
          class="filter-btn px-4 py-2 rounded-xl text-sm font-medium transition bg-white text-slate-600 border border-slate-200 hover:bg-slate-50">
          Terminées
        </button>
      </div>

      <!-- Liste -->
      <div id="todos-list" class="space-y-2">
        <div class="text-center py-12 text-slate-400 text-sm">Chargement…</div>
      </div>
    </div>
  </main>
</div>

<!-- Modal création / édition -->
<div id="todo-modal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg">
    <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100">
      <h2 id="todo-modal-title" class="text-lg font-semibold text-slate-800">Nouvelle tâche</h2>
      <button onclick="closeTodoModal()" class="text-slate-400 hover:text-slate-600 transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <form id="todo-form" onsubmit="submitTodoForm(event)" class="px-6 py-5 space-y-4">
      <!-- Intervention picker -->
      <div id="intervention-picker-group">
        <label class="block text-sm font-medium text-slate-700 mb-1">Intervention <span class="text-red-500">*</span></label>
        <div class="relative">
          <input id="todo-intervention-search" type="text" placeholder="Rechercher une intervention…"
            autocomplete="off"
            class="w-full border border-slate-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            oninput="searchInterventions(this.value)" onfocus="searchInterventions(this.value)" />
          <div id="intervention-dropdown"
            class="hidden absolute z-10 mt-1 w-full bg-white border border-slate-200 rounded-xl shadow-lg max-h-52 overflow-y-auto"></div>
        </div>
        <input type="hidden" id="todo-intervention-id" />
        <p id="todo-intervention-selected" class="text-xs text-blue-600 mt-1 hidden"></p>
      </div>

      <!-- Titre -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Titre <span class="text-red-500">*</span></label>
        <input id="todo-title" type="text" maxlength="500" required
          class="w-full border border-slate-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>

      <!-- Description -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Description</label>
        <textarea id="todo-description" rows="3" maxlength="2000"
          class="w-full border border-slate-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
      </div>

      <!-- Date limite -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Date limite</label>
        <input id="todo-due" type="date"
          class="border border-slate-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-600" />
      </div>

      <p id="todo-form-error" class="text-sm text-red-600 hidden"></p>

      <div class="flex gap-3 justify-end pt-1">
        <button type="button" onclick="closeTodoModal()"
          class="px-4 py-2 text-sm text-slate-600 hover:text-slate-800 transition">Annuler</button>
        <button type="submit" id="todo-submit-btn"
          class="px-5 py-2 bg-blue-600 text-white text-sm font-medium rounded-xl hover:bg-blue-700 transition">
          Enregistrer
        </button>
      </div>
    </form>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/layout.js"></script>
<script>
let currentFilter = 'all';
let allTodos = [];
let editingTodo = null;
let interventionSearchTimeout = null;
let interventionCache = [];

// ── Filtres ───────────────────────────────────────────────────────────────────

function setFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.className = 'filter-btn px-4 py-2 rounded-xl text-sm font-medium transition bg-white text-slate-600 border border-slate-200 hover:bg-slate-50';
  });
  const active = document.getElementById('filter-' + filter);
  if (active) active.className = 'filter-btn px-4 py-2 rounded-xl text-sm font-medium transition bg-blue-600 text-white shadow-sm';
  loadTodos();
}

// ── Chargement ────────────────────────────────────────────────────────────────

async function loadTodos() {
  const list = document.getElementById('todos-list');
  let params = '';
  if (currentFilter === 'pending') params = '?done=false';
  else if (currentFilter === 'done') params = '?done=true';
  else if (currentFilter === 'overdue') params = '?overdue=true';

  try {
    allTodos = await api.get('/interventions/todos' + params);
    renderTodos(allTodos);
  } catch (err) {
    list.innerHTML = `<div class="text-center py-12 text-red-400 text-sm">${escHtml(err.message || 'Erreur de chargement')}</div>`;
  }
}

function renderTodos(todos) {
  const list = document.getElementById('todos-list');
  if (!todos.length) {
    list.innerHTML = '<div class="text-center py-12 text-slate-400 text-sm italic">Aucune tâche.</div>';
    return;
  }

  const now = new Date();
  list.innerHTML = todos.map(todo => {
    const due = todo.dueAt ? new Date(todo.dueAt) : null;
    const overdue = due && !todo.done && due < now;
    const dueBadge = due
      ? `<span class="text-xs px-2 py-0.5 rounded-full font-medium ${overdue ? 'bg-red-100 text-red-600' : todo.done ? 'bg-slate-100 text-slate-400' : 'bg-amber-100 text-amber-700'}">${due.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: 'numeric' })}</span>`
      : '';

    const intv = todo.intervention;
    const room = intv?.room?.name ? ` · ${escHtml(intv.room.name)}` : '';
    const statusColor = intv?.status === 'CLOSED' ? 'text-slate-400' : 'text-blue-600';

    return `
    <div class="bg-white rounded-xl border border-slate-200 px-4 py-3 flex items-start gap-3 hover:shadow-sm transition group">
      <input type="checkbox" ${todo.done ? 'checked' : ''}
        onchange="toggleTodo('${escHtml(todo.interventionId)}', '${escHtml(todo.id)}', this.checked)"
        class="w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500 cursor-pointer flex-shrink-0 mt-1" />
      <div class="flex-1 min-w-0">
        <div class="flex items-start justify-between gap-2">
          <span class="text-sm font-medium ${todo.done ? 'line-through text-slate-400' : 'text-slate-800'} leading-snug">${escHtml(todo.title)}</span>
          <div class="flex items-center gap-2 flex-shrink-0 ml-2">
            ${dueBadge}
            <button onclick="openTodoModal('${escHtml(todo.interventionId)}', '${escHtml(todo.id)}')"
              class="opacity-0 group-hover:opacity-100 text-slate-400 hover:text-blue-500 transition"
              title="Modifier">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
              </svg>
            </button>
            <button onclick="deleteTodo('${escHtml(todo.interventionId)}', '${escHtml(todo.id)}')"
              class="opacity-0 group-hover:opacity-100 text-slate-400 hover:text-red-500 transition"
              title="Supprimer">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
              </svg>
            </button>
          </div>
        </div>
        ${todo.description ? `<p class="text-xs text-slate-400 mt-0.5 leading-relaxed">${escHtml(todo.description)}</p>` : ''}
        ${intv ? `<a href="/interventions.html?focus=${encodeURIComponent(intv.id)}" class="inline-flex items-center gap-1 mt-1 text-xs ${statusColor} hover:underline truncate max-w-full">
          <svg class="w-3 h-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
          </svg>
          ${escHtml(intv.title)}${room}
        </a>` : ''}
      </div>
    </div>`;
  }).join('');
}

// ── Actions ───────────────────────────────────────────────────────────────────

async function toggleTodo(interventionId, todoId, done) {
  try {
    await api.patch(`/interventions/${interventionId}/todos/${todoId}`, { done });
    await loadTodos();
  } catch (err) {
    showToast(err.message || 'Erreur', 'error');
    await loadTodos();
  }
}

async function deleteTodo(interventionId, todoId) {
  if (!confirm('Supprimer cette tâche ?')) return;
  try {
    await api.delete(`/interventions/${interventionId}/todos/${todoId}`);
    await loadTodos();
  } catch (err) {
    showToast(err.message || 'Erreur', 'error');
  }
}

// ── Modal ─────────────────────────────────────────────────────────────────────

async function openTodoModal(interventionId, todoId) {
  editingTodo = null;
  document.getElementById('todo-modal-title').textContent = 'Nouvelle tâche';
  document.getElementById('todo-title').value = '';
  document.getElementById('todo-description').value = '';
  document.getElementById('todo-due').value = '';
  document.getElementById('todo-intervention-id').value = '';
  document.getElementById('todo-intervention-search').value = '';
  document.getElementById('todo-intervention-selected').classList.add('hidden');
  document.getElementById('todo-intervention-selected').textContent = '';
  document.getElementById('intervention-picker-group').classList.remove('hidden');
  document.getElementById('todo-form-error').classList.add('hidden');

  if (todoId) {
    // Mode édition
    const todo = allTodos.find(t => t.id === todoId);
    if (!todo) return;
    editingTodo = todo;
    document.getElementById('todo-modal-title').textContent = 'Modifier la tâche';
    document.getElementById('todo-title').value = todo.title;
    document.getElementById('todo-description').value = todo.description || '';
    document.getElementById('todo-due').value = todo.dueAt ? todo.dueAt.slice(0, 10) : '';
    document.getElementById('todo-intervention-id').value = todo.interventionId;
    document.getElementById('intervention-picker-group').classList.add('hidden');
  } else if (interventionId) {
    document.getElementById('todo-intervention-id').value = interventionId;
    document.getElementById('intervention-picker-group').classList.add('hidden');
  }

  document.getElementById('todo-modal').classList.remove('hidden');
  setTimeout(() => document.getElementById('todo-title').focus(), 50);
}

function closeTodoModal() {
  document.getElementById('todo-modal').classList.add('hidden');
  document.getElementById('intervention-dropdown').classList.add('hidden');
  editingTodo = null;
}

async function submitTodoForm(event) {
  event.preventDefault();
  const errEl = document.getElementById('todo-form-error');
  errEl.classList.add('hidden');

  const title = document.getElementById('todo-title').value.trim();
  const description = document.getElementById('todo-description').value.trim() || null;
  const dueVal = document.getElementById('todo-due').value;
  const dueAt = dueVal ? new Date(dueVal).toISOString() : null;
  const interventionId = document.getElementById('todo-intervention-id').value;

  if (!title) { errEl.textContent = 'Le titre est requis.'; errEl.classList.remove('hidden'); return; }
  if (!interventionId && !editingTodo) { errEl.textContent = 'Veuillez sélectionner une intervention.'; errEl.classList.remove('hidden'); return; }

  const btn = document.getElementById('todo-submit-btn');
  btn.disabled = true;

  try {
    if (editingTodo) {
      await api.patch(`/interventions/${editingTodo.interventionId}/todos/${editingTodo.id}`, { title, description, dueAt });
    } else {
      await api.post(`/interventions/${interventionId}/todos`, { title, description, dueAt });
    }
    closeTodoModal();
    await loadTodos();
    showToast(editingTodo ? 'Tâche mise à jour' : 'Tâche créée', 'success');
  } catch (err) {
    errEl.textContent = err.message || 'Erreur lors de l\'enregistrement.';
    errEl.classList.remove('hidden');
  } finally {
    btn.disabled = false;
  }
}

// ── Recherche intervention ────────────────────────────────────────────────────

async function searchInterventions(query) {
  clearTimeout(interventionSearchTimeout);
  const dropdown = document.getElementById('intervention-dropdown');

  if (!query.trim()) {
    dropdown.classList.add('hidden');
    return;
  }

  interventionSearchTimeout = setTimeout(async () => {
    try {
      const results = await api.get(`/interventions?search=${encodeURIComponent(query)}&limit=10`);
      const items = Array.isArray(results) ? results : (results.interventions || results.data || []);
      if (!items.length) {
        dropdown.innerHTML = '<div class="px-3 py-2 text-sm text-slate-400 italic">Aucun résultat.</div>';
        dropdown.classList.remove('hidden');
        return;
      }
      dropdown.innerHTML = items.map(i => `
        <button type="button" onclick="selectIntervention('${escHtml(i.id)}', ${JSON.stringify(escHtml(i.title))})"
          class="w-full text-left px-3 py-2 text-sm hover:bg-slate-50 transition flex items-start gap-2">
          <span class="flex-1 text-slate-800 font-medium">${escHtml(i.title)}</span>
          ${i.room?.name ? `<span class="text-xs text-slate-400 flex-shrink-0">${escHtml(i.room.name)}</span>` : ''}
        </button>`).join('');
      dropdown.classList.remove('hidden');
    } catch {
      dropdown.classList.add('hidden');
    }
  }, 250);
}

function selectIntervention(id, title) {
  document.getElementById('todo-intervention-id').value = id;
  document.getElementById('todo-intervention-search').value = title;
  const sel = document.getElementById('todo-intervention-selected');
  sel.textContent = title;
  sel.classList.remove('hidden');
  document.getElementById('intervention-dropdown').classList.add('hidden');
}

// Fermer dropdown au clic extérieur
document.addEventListener('click', e => {
  const picker = document.getElementById('intervention-picker-group');
  if (picker && !picker.contains(e.target)) {
    document.getElementById('intervention-dropdown').classList.add('hidden');
  }
});

// ── Utilitaires ───────────────────────────────────────────────────────────────

function escHtml(s) {
  return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ── Init ──────────────────────────────────────────────────────────────────────

requireLogin().then(() => {
  renderNav('todos');
  loadTodos();
});
</script>
</body>
</html>
